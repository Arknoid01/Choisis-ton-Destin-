<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliothèque</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<style>
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; background:#0d0d0f; color:#e8e0d0; font-family:'Cormorant Garamond',serif; overflow-x:hidden; }

:root {
  --gold:   #c8a96e;
  --gold2:  #e8d4a0;
  --gold3:  #8a6a30;
  --cream:  #e8e0d0;
  --dim:    #9a8a70;
  --dimmer: #5a5040;
  --bg:     #0d0d0f;
  --bg2:    #13110e;
  --bg3:    #1a1710;
  --border: #2a2418;
}

/* ── BACKGROUND ── */
.bg-gradient {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(200,169,110,0.05) 0%, transparent 70%),
    linear-gradient(180deg, #0d0d0f 0%, #13110e 100%);
}

/* ── TOPBAR ── */
#topbar {
  position:fixed; top:0; left:0; right:0; height:54px;
  background:rgba(13,13,15,0.9); border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px); z-index:100;
  display:flex; align-items:center; gap:12px; padding:0 16px;
}
#btn-back {
  width:36px; height:36px; border-radius:8px;
  border:1px solid var(--border); background:none;
  color:var(--dim); font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s; text-decoration:none; flex-shrink:0;
}
#btn-back:hover { border-color:var(--gold3); color:var(--cream); }
.topbar-title {
  font-family:'Cinzel',serif; font-size:14px; font-weight:600;
  color:var(--cream); letter-spacing:2px; flex:1;
}



/* ── SCROLL AREA ── */
#scroll {
  position:fixed; top:54px; left:0; right:0; bottom:0;
  overflow-y:auto; z-index:10;
}
#scroll::-webkit-scrollbar { width:3px; }
#scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }

/* ── CONTENT ── */
#content { max-width:520px; margin:0 auto; padding:20px 16px 60px; }

/* ── KIDS BANNER ── */
.kids-banner {
  background:linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,160,0,0.05));
  border:1px solid rgba(255,215,0,0.2); border-radius:14px;
  padding:14px 16px; margin-bottom:8px;
  display:flex; align-items:center; gap:12px;
}
.kids-banner-icon { font-size:28px; flex-shrink:0; }
.kids-banner-text { flex:1; }
.kids-banner-title {
  font-family:'Cinzel',serif; font-size:13px; font-weight:600;
  color:#ffd700; letter-spacing:1px; margin-bottom:2px;
}
.kids-banner-sub { font-size:12px; color:var(--dim); font-style:italic; }
.kids-free-badge {
  background:#ffd70022; border:1px solid #ffd70044;
  border-radius:20px; padding:4px 10px;
  font-family:'Lato',sans-serif; font-size:10px;
  font-weight:700; color:#ffd700; letter-spacing:1px;
  flex-shrink:0;
}

/* ── PACK SECTION ── */
.pack-section { margin-bottom:28px; animation:fade-up .4s ease; }

.pack-header {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; border-radius:14px 14px 0 0;
  background:var(--bg3); border:1px solid var(--border);
  border-bottom:none; position:relative; overflow:hidden;
}
.pack-header::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, var(--pack-color, rgba(200,169,110,0.08)), transparent);
}
.pack-icon { font-size:24px; flex-shrink:0; position:relative; }
.pack-info { flex:1; position:relative; }
.pack-name {
  font-family:'Cinzel',serif; font-size:14px; font-weight:600;
  color:var(--cream); letter-spacing:1px;
}
.pack-meta {
  font-size:11px; color:var(--dim); margin-top:2px;
  font-family:'Lato',sans-serif;
}
.pack-count {
  background:rgba(255,255,255,0.06); border:1px solid var(--border);
  border-radius:20px; padding:4px 10px;
  font-family:'Lato',sans-serif; font-size:11px;
  color:var(--dim); position:relative; flex-shrink:0;
}
.pack-count strong { color:var(--cream); }

/* PACK PRICE BADGE */
.pack-price {
  font-family:'Cinzel',serif; font-size:12px; font-weight:600;
  padding:6px 14px; border-radius:20px; flex-shrink:0;
  position:relative; cursor:pointer; transition:all .2s;
  border:1px solid var(--pack-color, var(--gold3));
  color:var(--pack-color, var(--gold2));
  background:color-mix(in srgb, var(--pack-color, var(--gold3)) 12%, transparent);
}
.pack-price:hover { transform:scale(1.05); }
.pack-price.free {
  border-color:rgba(255,215,0,0.4); color:#ffd700;
  background:rgba(255,215,0,0.08);
}
.pack-price.locked {
  filter:grayscale(0.3);
}

/* LOCK OVERLAY ON PACK */
.pack-locked-bar {
  background:rgba(0,0,0,0.4); border:1px solid var(--border);
  border-top:none; border-radius:0 0 14px 14px;
  padding:10px 16px; display:flex; align-items:center; gap:8px;
  font-family:'Lato',sans-serif; font-size:11px; color:var(--dimmer);
  letter-spacing:1px;
}
.pack-locked-bar .lock-icon { font-size:14px; }

/* ── STORY CARDS ── */
.stories-list {
  border:1px solid var(--border); border-top:none;
  border-radius:0 0 14px 14px; overflow:hidden;
}

.story-card {
  display:flex; align-items:center; gap:14px;
  padding:14px 16px; background:var(--bg2);
  border-bottom:1px solid var(--border);
  cursor:pointer; transition:all .2s; position:relative;
}
.story-card:last-child { border-bottom:none; border-radius:0 0 14px 14px; }
.story-card:hover { background:color-mix(in srgb, var(--pack-color, var(--gold3)) 5%, var(--bg2)); }
.story-card:hover .story-arrow { transform:translateX(3px); }

.story-card.locked {
  cursor:default; opacity:0.55;
  pointer-events:none;
}

.story-icon {
  width:44px; height:44px; border-radius:10px;
  background:var(--bg3); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.story-info { flex:1; min-width:0; }
.story-title {
  font-family:'Cinzel',serif; font-size:13px; font-weight:600;
  color:var(--cream); white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.story-desc {
  font-size:12px; color:var(--dim);
  font-style:italic; margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.story-meta {
  display:flex; gap:6px; margin-top:4px; flex-wrap:wrap;
}
.story-tag {
  font-family:'Lato',sans-serif; font-size:9px;
  letter-spacing:1px; padding:2px 6px; border-radius:20px;
  border:1px solid var(--border); color:var(--dimmer);
  text-transform:uppercase;
}
.story-tag.kids { border-color:rgba(255,215,0,0.3); color:#ffd700; }
.story-tag.new  { border-color:rgba(100,220,150,0.3); color:#64dc96; }

.story-arrow { color:var(--dim); font-size:18px; transition:transform .2s; flex-shrink:0; }
.story-lock  { color:var(--dimmer); font-size:16px; flex-shrink:0; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align:center; padding:40px 20px;
  color:var(--dimmer); font-style:italic; font-size:14px;
}

/* ── ANIMATIONS ── */
@keyframes fade-up {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
</style>
</head>
<body>

<div class="bg-gradient"></div>

<!-- TOPBAR -->
<div id="topbar">
  <a href="index.html" id="btn-back">←</a>
  <div class="topbar-title" id="txt-library">Bibliothèque</div>
</div>

<!-- SCROLL AREA -->
<div id="scroll">
  <div id="content">
    <div class="empty-state">Chargement...</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const PACK_CONFIG = {
  free: {
    name:  { fr:'Histoires gratuites', en:'Free Stories',   es:'Historias gratuitas' },
    icon:  '🆓',
    color: 'rgba(200,169,110,0.6)',
    free:  true,
    order: 0
  },
  kids: {
    name:  { fr:'Pack Enfants',        en:'Kids Pack',       es:'Pack Infantil' },
    icon:  '🧒',
    color: 'rgba(255,215,0,0.6)',
    free:  true,
    order: 1
  },
  neon: {
    name:  { fr:'Pack Neon',           en:'Neon Pack',       es:'Pack Neón' },
    icon:  '⚡',
    color: 'rgba(0,245,255,0.6)',
    price: '2,99€',
    order: 2
  },
  pirates: {
    name:  { fr:'Pack Pirates',        en:'Pirates Pack',    es:'Pack Piratas' },
    icon:  '🏴‍☠️',
    color: 'rgba(212,160,32,0.6)',
    price: '2,99€',
    order: 3
  },
  cosmos: {
    name:  { fr:'Pack Cosmos',         en:'Cosmos Pack',     es:'Pack Cosmos' },
    icon:  '🚀',
    color: 'rgba(100,180,255,0.6)',
    price: '2,99€',
    order: 4
  },
  fantasy: {
    name:  { fr:'Pack Legends',        en:'Legends Pack',    es:'Pack Leyendas' },
    icon:  '⚔️',
    color: 'rgba(160,96,248,0.6)',
    price: '2,99€',
    order: 5
  },
  wilds: {
    name:  { fr:'Pack Wilds',          en:'Wilds Pack',      es:'Pack Wilds' },
    icon:  '🌿',
    color: 'rgba(100,220,150,0.6)',
    price: '2,99€',
    order: 6
  }
};

// Packs déverrouillés (sera géré par RevenueCat plus tard)
function getUnlockedPacks() {
  try {
    return JSON.parse(localStorage.getItem('sf_unlocked_packs') || '["free","kids"]');
  } catch { return ['free','kids']; }
}

let currentLang = localStorage.getItem('sf_lang') || 'fr';
let allGames = [];

// ══════════════════════════════════════════════
// LOAD
// ══════════════════════════════════════════════
async function loadGames() {
  try {
    const r = await fetch('games.json');
    if (r.ok) allGames = await r.json();
  } catch(e) { allGames = []; }
  renderLibrary();
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function renderLibrary() {
  const unlocked = getUnlockedPacks();
  const filtered = allGames.filter(g => g.lang === currentLang);

  // Grouper par pack
  const byPack = {};
  filtered.forEach(g => {
    const packId = g.pack || (g.kids ? 'kids' : 'free');
    if (!byPack[packId]) byPack[packId] = [];
    byPack[packId].push(g);
  });

  // Trier les packs par ordre défini
  const packIds = Object.keys(byPack).sort((a,b) => {
    const oa = PACK_CONFIG[a]?.order ?? 99;
    const ob = PACK_CONFIG[b]?.order ?? 99;
    return oa - ob;
  });

  if (!packIds.length) {
    document.getElementById('content').innerHTML =
      `<div class="empty-state">Aucune histoire disponible en ${currentLang.toUpperCase()}</div>`;
    return;
  }

  let html = '';

  packIds.forEach(packId => {
    const stories = byPack[packId];
    const cfg = PACK_CONFIG[packId] || { name:{fr:packId,en:packId,es:packId}, icon:'📖', color:'rgba(200,169,110,0.5)', order:99 };
    const isUnlocked = cfg.free || unlocked.includes(packId);
    const packName = cfg.name[currentLang] || cfg.name.fr;
    const count = stories.length;
    const colorVar = cfg.color;

    // Badge prix/gratuit
    let priceBadge = '';
    if (cfg.free) {
      priceBadge = `<span class="pack-price free">GRATUIT</span>`;
    } else if (isUnlocked) {
      priceBadge = `<span class="pack-price" style="--pack-color:${colorVar};border-color:rgba(100,220,150,0.5);color:#64dc96;background:rgba(100,220,150,0.08)">✓ Débloqué</span>`;
    } else {
      priceBadge = `<span class="pack-price locked" style="--pack-color:${colorVar}" onclick="buyPack('${packId}')">🔒 ${cfg.price || ''}</span>`;
    }

    // Compteur
    const countLabel = currentLang === 'fr'
      ? `<strong>${count}</strong> histoire${count > 1 ? 's' : ''}`
      : currentLang === 'en'
        ? `<strong>${count}</strong> stor${count > 1 ? 'ies' : 'y'}`
        : `<strong>${count}</strong> historia${count > 1 ? 's' : ''}`;

    html += `<div class="pack-section" style="--pack-color:${colorVar}">
      <div class="pack-header">
        <div class="pack-icon">${cfg.icon}</div>
        <div class="pack-info">
          <div class="pack-name">${packName}</div>
          <div class="pack-meta">${countLabel} disponible${count > 1 && currentLang === 'fr' ? 's' : ''}</div>
        </div>
        ${priceBadge}
      </div>`;

    // Stories
    html += `<div class="stories-list">`;
    stories.forEach(g => {
      const locked = !isUnlocked;
      html += `<div class="story-card${locked ? ' locked' : ''}"
        onclick="${locked ? '' : `launchStory('${g.file}')`}"
        style="--pack-color:${colorVar}">
        <div class="story-icon">${g.kids ? '🧒' : (g.icon || '📖')}</div>
        <div class="story-info">
          <div class="story-title">${g.title}</div>
          <div class="story-desc">${g.desc || ''}</div>
          <div class="story-meta">
            ${g.kids ? `<span class="story-tag kids">Enfants</span>` : ''}
            ${g.new  ? `<span class="story-tag new">Nouveau</span>`  : ''}
            ${g.duration ? `<span class="story-tag">${g.duration}</span>` : ''}
            ${g.endings  ? `<span class="story-tag">${g.endings} fins</span>` : ''}
          </div>
        </div>
        ${locked
          ? `<div class="story-lock">🔒</div>`
          : `<div class="story-arrow">›</div>`}
      </div>`;
    });
    html += `</div>`;

    // Barre verrouillée
    if (!isUnlocked) {
      const lockMsg = {
        fr:`Achetez le ${packName} pour débloquer ces histoires`,
        en:`Purchase the ${packName} to unlock these stories`,
        es:`Compra el ${packName} para desbloquear estas historias`
      };
      html += `<div class="pack-locked-bar">
        <span class="lock-icon">🔒</span>
        <span>${lockMsg[currentLang] || lockMsg.fr}</span>
      </div>`;
    }

    html += `</div>`;
  });

  document.getElementById('content').innerHTML = html;
}

// ══════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════
function launchStory(file) {
  const savedName = localStorage.getItem('sf_player_name');
  localStorage.setItem('sf_game_file', file);
  if (!savedName) {
    showNamePopup(file);
  } else {
    window.location.href = 'game.html?story=' + encodeURIComponent(file);
  }
}

function buyPack(packId) {
  // Placeholder — sera remplacé par RevenueCat
  const cfg = PACK_CONFIG[packId];
  const name = cfg?.name[currentLang] || packId;
  const price = cfg?.price || '';
  alert(`Achat du ${name} — ${price}\n\n(Système d'achat à intégrer via RevenueCat)`);
}

// ── NAME POPUP (repris de index) ──
function showNamePopup(file) {
  const lang = currentLang;
  const texts = {
    fr:{ title:'Qui êtes-vous ?', sub:'Entrez votre prénom', btn:'COMMENCER', skip:'Passer' },
    en:{ title:'Who are you?',    sub:'Enter your name',     btn:'START',     skip:'Skip'  },
    es:{ title:'¿Quién eres?',    sub:'Tu nombre',           btn:'EMPEZAR',   skip:'Omitir'}
  };
  const t = texts[lang] || texts.fr;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:500;background:rgba(10,8,5,0.92);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px)';
  overlay.innerHTML = `
    <div style="width:100%;max-width:320px;margin:24px;background:#13110e;border:1px solid #2a2418;border-radius:16px;padding:32px 24px;text-align:center">
      <div style="font-size:30px;margin-bottom:12px">✦</div>
      <div style="font-family:'Cinzel',serif;font-size:15px;color:#e8e0d0;letter-spacing:2px;margin-bottom:6px">${t.title}</div>
      <div style="font-size:12px;color:#9a8a70;font-style:italic;margin-bottom:18px">${t.sub}</div>
      <input id="popup-name" type="text" maxlength="20" placeholder="..."
        style="width:100%;background:#1a1710;border:1px solid #2a2418;border-radius:8px;color:#e8e0d0;font-size:18px;padding:11px;text-align:center;outline:none;margin-bottom:14px;font-family:'Cormorant Garamond',serif"
        onkeydown="if(event.key==='Enter')document.getElementById('popup-confirm').click()">
      <button id="popup-confirm"
        style="width:100%;padding:12px;border:1px solid #8a6a30;background:rgba(200,169,110,0.1);color:#e8d4a0;font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;border-radius:8px;cursor:pointer;margin-bottom:8px"
        onclick="
          const v=document.getElementById('popup-name').value.trim();
          if(v)localStorage.setItem('sf_player_name',v);
          document.body.removeChild(this.closest('[style*=fixed]'));
          window.location.href='game.html?story='+encodeURIComponent('${file}');
        ">${t.btn}</button>
      <button style="background:none;border:none;color:#5a5040;font-size:11px;cursor:pointer;font-family:Lato,sans-serif;letter-spacing:1px"
        onclick="
          document.body.removeChild(this.closest('[style*=fixed]'));
          window.location.href='game.html?story='+encodeURIComponent('${file}');
        ">${t.skip}</button>
    </div>`;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('popup-name')?.focus(), 200);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════

loadGames();
</script>
</body>
</html>
