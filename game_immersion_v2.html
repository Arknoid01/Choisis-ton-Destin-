<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StoryForge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── BACKGROUND ── */
#bg-canvas {
  position:fixed; inset:0; z-index:0;
  pointer-events:none;
}
.bg-gradient {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,   var(--glow-top,    rgba(124,109,250,0.05)) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 20% 100%,  var(--glow-bottom, rgba(124,109,250,0.04)) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 80%,   rgba(0,0,0,0.06) 0%, transparent 50%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
}
.particle {
  position:fixed; border-radius:50%;
  background:var(--accent);
  pointer-events:none; z-index:1;
  animation: float-up linear infinite;
  opacity:0;
}
@keyframes float-up {
  0%   { transform:translateY(0) translateX(0) scale(1); opacity:0; }
  10%  { opacity:0.5; }
  90%  { opacity:0.15; }
  100% { transform:translateY(-100vh) translateX(var(--drift)) scale(0.3); opacity:0; }
}

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

/* ── CSS VARS — overridden by theme ── */
:root {
  --bg:      #0e0e12;
  --bg2:     #14141a;
  --bg3:     #1c1c24;
  --bg4:     #24242e;
  --border:  #2e2e3a;
  --accent:  #7c6dfa;
  --accent2: #fa6d8f;
  --accent3: #6dfabc;
  --text:    #e8e8f0;
  --text2:   #9090a8;
  --text3:   #5a5a72;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  line-height: 1.75;
}

/* ── TOPBAR ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 52px; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  background: color-mix(in srgb, var(--bg2) 85%, transparent);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
#btn-back {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
  text-decoration: none;
}
#btn-back:hover { border-color: var(--accent); color: var(--text); }

#game-title {
  font-family: 'Cinzel', serif;
  font-size: 14px; font-weight: 600;
  color: var(--text); letter-spacing: 1px;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

#btn-menu {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
#btn-menu:hover { border-color: var(--accent); color: var(--text); }

/* ── STATS BAR ── */
#stats-bar {
  position: fixed; top: 52px; left: 0; right: 0;
  z-index: 99;
  background: color-mix(in srgb, var(--bg2) 80%, transparent);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none;
  backdrop-filter: blur(10px);
}
#stats-bar::-webkit-scrollbar { display: none; }
#stats-bar.hidden { display: none; }

.stat-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.stat-chip::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: var(--pct, 50%);
  background: var(--color, var(--accent));
  opacity: 0.12;
  transition: width .5s ease;
}
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 1px;
  color: var(--text3); text-transform: uppercase;
}
.stat-value {
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 400;
  color: var(--color, var(--accent));
}

/* ── SCROLL AREA ── */
#scroll-area {
  position: fixed;
  top: 52px; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  scroll-behavior: smooth;
  z-index: 10;
}
#scroll-area.has-stats { top: 92px; }
#scroll-area::-webkit-scrollbar { width: 3px; }
#scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── MAIN CONTENT ── */
#content {
  max-width: 600px;
  margin: 0 auto;
  padding: 28px 20px 160px;
}

/* ── LOCATION PILL ── */
.location-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--accent2); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 20px;
  opacity: 0.8;
}
.location-pill::before {
  content: '◈';
  animation: loc-pulse 2.5s infinite;
}
@keyframes loc-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── SCENE TEXT ── */
.scene-text {
  font-size: 17px; line-height: 1.85;
  color: var(--text); margin-bottom: 32px;
  font-weight: 300;
}
.scene-text em {
  color: var(--accent); font-style: normal; font-weight: 500;
}
.scene-text strong {
  color: var(--accent2); font-weight: 600;
}

/* ── STAT NOTIFICATION ── */
.stat-notif {
  display: flex; align-items: center; gap: 8px;
  background: color-mix(in srgb, var(--accent) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
  border-radius: 8px; padding: 8px 14px;
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--accent); margin-bottom: 20px;
  animation: notif-in .4s ease;
}
@keyframes notif-in {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── CHOICES ── */
#choices-area {
  display: flex; flex-direction: column; gap: 10px;
}

.choice-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 400;
  cursor: pointer; text-align: left;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
  line-height: 1.5;
}
.choice-btn::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent);
  transform: scaleY(0);
  transition: transform .2s ease;
  box-shadow: 0 0 8px var(--accent);
}
.choice-btn:hover {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 6%, var(--bg3));
  transform: translateX(4px);
  color: var(--text);
}
.choice-btn:hover::before { transform: scaleY(1); }
.choice-btn:active { transform: translateX(2px) scale(0.99); }

.choice-index {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--accent);
  letter-spacing: 2px; display: block;
  margin-bottom: 4px; opacity: 0.7;
}

/* ── END SCREEN ── */
#end-screen {
  text-align: center; padding: 40px 20px;
  animation: scene-in .6s ease;
}
.end-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(18px, 6vw, 28px);
  font-weight: 600; letter-spacing: 3px;
  color: var(--accent); margin-bottom: 20px;
  text-shadow: 0 0 30px color-mix(in srgb, var(--accent) 40%, transparent);
}
.end-stats {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin: 24px 0;
  text-align: left;
}
.end-stat-row {
  display: flex; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.end-stat-row:last-child { border-bottom: none; }
.end-stat-label { color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1px; }
.end-stat-val { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 400; }

.end-text {
  font-size: 15px; color: var(--text2);
  font-style: italic; line-height: 1.7;
  margin-bottom: 32px;
}
.end-buttons { display: flex; flex-direction: column; gap: 10px; max-width: 280px; margin: 0 auto; }
.end-btn {
  padding: 14px 24px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-family: 'Cinzel', serif;
  font-size: 12px; letter-spacing: 2px; cursor: pointer;
  transition: all .2s;
}
.end-btn:hover { border-color: var(--accent); color: var(--accent); }
.end-btn.primary {
  background: var(--accent); border-color: var(--accent);
  color: var(--bg); font-weight: 600;
}
.end-btn.primary:hover { opacity: 0.9; }

/* ── SCENE ANIMATION ── */
.scene-in { animation: scene-in .45s ease; }
@keyframes scene-in {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 500;
  transition: opacity .4s;
}
#loading.fade { opacity: 0; pointer-events: none; }
.loading-dots {
  display: flex; gap: 6px;
}
.loading-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); animation: dot-pulse 1.2s ease infinite;
}
.loading-dot:nth-child(2) { animation-delay: .2s; }
.loading-dot:nth-child(3) { animation-delay: .4s; }
@keyframes dot-pulse {
  0%,100% { opacity:.2; transform:scale(0.8); }
  50%     { opacity:1;  transform:scale(1.2); }
}
.loading-label {
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--text3); letter-spacing: 3px;
}

/* ── ERROR ── */
#error-screen {
  display: none;
  position: fixed; inset: 0;
  background: var(--bg);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  text-align: center; padding: 32px;
}
#error-screen.show { display: flex; }
.error-icon { font-size: 40px; opacity: 0.4; }
.error-msg { font-size: 14px; color: var(--text2); max-width: 300px; line-height: 1.6; }
.error-btn {
  padding: 10px 24px; border: 1px solid var(--border);
  border-radius: 8px; background: none; color: var(--text2);
  font-family: 'Cinzel', serif; font-size: 12px;
  letter-spacing: 2px; cursor: pointer; transition: all .2s;
}
.error-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── MENU DRAWER ── */
#menu-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0); pointer-events: none;
  transition: background .25s;
}
#menu-overlay.open { background: rgba(0,0,0,0.6); pointer-events: all; }
#menu-drawer {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 260px; background: var(--bg2);
  border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; overflow: hidden;
}
#menu-overlay.open #menu-drawer { transform: translateX(0); }
.drawer-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.drawer-title {
  font-family: 'Cinzel', serif; font-size: 13px;
  font-weight: 600; letter-spacing: 2px; color: var(--text);
}
.drawer-subtitle {
  font-size: 12px; color: var(--text3);
  font-style: italic; margin-top: 3px;
}
.drawer-body { flex: 1; padding: 12px; overflow-y: auto; }
.drawer-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 8px;
  border: none; background: none; width: 100%;
  text-align: left; color: var(--text2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; cursor: pointer; transition: all .15s;
}
.drawer-item:hover { background: var(--bg3); color: var(--text); }
.drawer-item-icon { font-size: 18px; width: 24px; text-align: center; }

/* ── HISTORY LOG ── */
#history-log {
  display: none; padding: 12px;
  border-top: 1px solid var(--border);
  max-height: 200px; overflow-y: auto;
}
#history-log.open { display: block; }
.history-entry {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text3); padding: 4px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
  line-height: 1.4;
}
.history-entry .h-scene { color: var(--accent2); opacity: 0.7; }

/* ── PROGRESS BAR ── */
#progress-bar {
  position: fixed; top: 52px; left: 0; right: 0;
  height: 2px; z-index: 98;
  background: var(--border);
}
#progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width .5s ease;
  box-shadow: 0 0 6px var(--accent);
  width: 0%;
}


/* ── Immersion presets ── */
.choice-btn.fx-pulse:active { transform: scale(.985); box-shadow:0 0 26px var(--accent); }
.choice-btn.fx-shake:active { animation: fx-shake .22s linear; }
.choice-btn.fx-glitch:active { text-shadow:2px 0 var(--accent2), -2px 0 var(--accent); }
.choice-btn.fx-flash:active { filter:brightness(1.45); }
@keyframes fx-shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-3px)} 50%{transform:translateX(3px)} 75%{transform:translateX(-2px)} }
#fx-overlay { position:fixed; inset:0; pointer-events:none; z-index:9999; opacity:0; }
#fx-overlay.flash { animation:fx-flash .32s ease; background:var(--accent); }
#fx-overlay.glitch { animation:fx-glitch .38s steps(2,end); background:linear-gradient(90deg, transparent, color-mix(in srgb,var(--accent) 25%, transparent), transparent); }
@keyframes fx-flash { 0%{opacity:0} 20%{opacity:.22} 100%{opacity:0} }
@keyframes fx-glitch { 0%{opacity:0; transform:translateX(0)} 20%{opacity:.25; transform:translateX(-8px)} 45%{opacity:.12; transform:translateX(8px)} 70%{opacity:.2; transform:translateX(-4px)} 100%{opacity:0; transform:translateX(0)} }
.scene-in.transition-fade { animation: scene-in .55s ease; }
.scene-in.transition-glitch { animation: scene-in .25s ease, fx-shake .32s linear; }
.scene-in.transition-scanline::before { content:''; position:fixed; inset:0; pointer-events:none; background:repeating-linear-gradient(to bottom, transparent 0 4px, rgba(255,255,255,.035) 5px); animation:fx-flash .55s ease; }
.scene-in.transition-flash { animation: scene-in .25s ease, fx-flash .35s ease; }


/* ── Scene media: backgrounds, portraits, stronger visual immersion ── */
#scene-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
  background-size: cover;
  background-position: center;
  transition: opacity .7s ease, filter .7s ease, transform 1.2s ease;
  filter: saturate(1.1) contrast(1.05) brightness(.72);
  transform: scale(1.02);
}
#scene-bg.visible { opacity: .48; transform: scale(1); }
#scene-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 50% 10%, transparent, var(--bg) 78%),
    linear-gradient(to bottom, transparent, var(--bg) 95%);
}
#scene-bg.preset-neon_street,
#scene-bg.preset-apartment_red_alert,
#scene-bg.preset-city_sunrise,
#scene-bg.preset-dark_room,
#scene-bg.preset-metro_hideout,
#scene-bg.preset-helix_tower,
#scene-bg.preset-rooftops,
#scene-bg.preset-prison,
#scene-bg.preset-orbital_station,
#scene-bg.preset-wasteland,
#scene-bg.preset-lab,
#scene-bg.preset-warehouse {
  background-image: var(--scene-gradient);
}
#scene-bg.preset-neon_street { --scene-gradient: linear-gradient(135deg, #070817 0%, #151047 35%, #52003c 68%, #051d24 100%); }
#scene-bg.preset-apartment_red_alert { --scene-gradient: radial-gradient(circle at 30% 20%, rgba(255,0,86,.75), transparent 32%), linear-gradient(135deg,#08040b,#26030d 48%,#090912); }
#scene-bg.preset-dark_room { --scene-gradient: radial-gradient(circle at 65% 30%, rgba(0,247,255,.22), transparent 34%), linear-gradient(135deg,#02030a,#151526); }
#scene-bg.preset-metro_hideout { --scene-gradient: linear-gradient(135deg,#050607,#102018 45%,#22200b); }
#scene-bg.preset-helix_tower { --scene-gradient: linear-gradient(135deg,#020411,#111a44 35%,#320033 80%); }
#scene-bg.preset-rooftops { --scene-gradient: linear-gradient(135deg,#050816,#14285c 50%,#27002f); }
#scene-bg.preset-city_sunrise { --scene-gradient: linear-gradient(135deg,#16051f,#fd5e53 55%,#ffd166 100%); }
#scene-bg.preset-prison { --scene-gradient: linear-gradient(135deg,#020204,#101019 55%,#2d2d44); }
#scene-bg.preset-orbital_station { --scene-gradient: radial-gradient(circle at 70% 20%, rgba(255,255,255,.18), transparent 18%), linear-gradient(135deg,#03030a,#15143b 52%,#070714); }
#scene-bg.preset-wasteland { --scene-gradient: linear-gradient(135deg,#100d08,#4d2a15 58%,#15100b); }
#scene-bg.preset-lab { --scene-gradient: linear-gradient(135deg,#061018,#0e3a45 45%,#111122); }
#scene-bg.preset-warehouse { --scene-gradient: linear-gradient(135deg,#090907,#2b1a10 50%,#08080e); }

.scene-layout { display:grid; grid-template-columns: minmax(0,1fr); gap:16px; }
.scene-portrait {
  display:none;
  align-items:center;
  gap:12px;
  padding:12px;
  border:1px solid color-mix(in srgb, var(--accent) 32%, var(--border));
  background: color-mix(in srgb, var(--bg2) 76%, transparent);
  border-radius:18px;
  box-shadow:0 0 24px color-mix(in srgb, var(--accent) 12%, transparent);
  margin-bottom:14px;
}
.scene-portrait.visible { display:flex; animation: scene-in .5s ease; }
.scene-portrait img {
  width:76px; height:76px; object-fit:cover; border-radius:16px;
  border:1px solid var(--border);
}
.portrait-fallback {
  width:76px; height:76px; border-radius:16px;
  display:grid; place-items:center;
  background:linear-gradient(135deg, var(--accent2), var(--accent));
  color:var(--bg); font-size:34px; font-weight:900;
}
.portrait-name { font-family:'DM Mono', monospace; color:var(--accent); font-size:12px; letter-spacing:2px; text-transform:uppercase; }
.portrait-desc { color:var(--text2); font-size:13px; margin-top:4px; }

#content.choice-shake { animation: fx-shake .26s linear; }
#content.choice-pulse { animation: choice-pulse .28s ease; }
#content.choice-glitch { animation: fx-shake .22s linear; filter: hue-rotate(18deg); }
@keyframes choice-pulse { 0%{transform:scale(1)} 45%{transform:scale(.992)} 100%{transform:scale(1)} }

@media (min-width: 760px) {
  .scene-layout.with-portrait { grid-template-columns: 150px minmax(0,1fr); align-items:start; }
  .scene-layout.with-portrait .scene-portrait { flex-direction:column; text-align:center; position:sticky; top:120px; }
}

</style>
</head>
<body>

<div id="scene-bg"></div>
<div class="bg-gradient"></div>
<canvas id="bg-canvas"></canvas>

<!-- LOADING -->
<div id="loading">
  <div class="loading-dots">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>
  <div class="loading-label">CHARGEMENT</div>
</div>

<!-- ERROR -->
<div id="error-screen">
  <div class="error-icon">✦</div>
  <div id="error-msg" class="error-msg">Impossible de charger cette histoire.</div>
  <button class="error-btn" onclick="window.location.href='index.html'">← Retour</button>
</div>

<!-- TOPBAR -->
<div id="topbar">
  <a href="index.html" id="btn-back" title="Retour">←</a>
  <div id="game-title">…</div>
  <button id="btn-menu" onclick="openMenu()" title="Menu">☰</button>
</div>

<!-- PROGRESS BAR -->
<div id="progress-bar"><div id="progress-fill"></div></div>

<!-- STATS BAR -->
<div id="stats-bar" class="hidden"></div>

<!-- SCROLL AREA -->
<div id="scroll-area">
  <div id="content"></div>
</div>

<!-- MENU DRAWER -->
<div id="menu-overlay" onclick="handleMenuClick(event)">
  <div id="menu-drawer">
    <div class="drawer-header">
      <div class="drawer-title" id="drawer-game-title">Histoire</div>
      <div class="drawer-subtitle" id="drawer-scene-count">0 scènes visitées</div>
    </div>
    <div class="drawer-body">
      <button class="drawer-item" onclick="restartGame();closeMenu()">
        <span class="drawer-item-icon">↺</span> Recommencer
      </button>
      <button class="drawer-item" onclick="toggleHistory()">
        <span class="drawer-item-icon">📜</span> Journal
      </button>
      <button class="drawer-item" onclick="window.location.href='index.html'">
        <span class="drawer-item-icon">←</span> Quitter
      </button>
    </div>
    <div id="history-log"></div>
  </div>
</div>

<div id="fx-overlay"></div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let story      = null;   // full JSON
let stats      = {};     // current stat values
let history    = [];     // visited scenes
let currentId  = null;
let currentChoices = [];     // choices shown after shuffle

// ══════════════════════════════════════════════
// THEME — apply from story.theme
// ══════════════════════════════════════════════
function applyTheme(theme) {
  if (!theme) return;
  const root = document.documentElement;
  const map = {
    bg:'--bg', bg2:'--bg2', bg3:'--bg3', bg4:'--bg4',
    border:'--border', accent:'--accent',
    accent2:'--accent2', accent3:'--accent3',
    text:'--text', text2:'--text2', text3:'--text3'
  };
  Object.entries(map).forEach(([k, v]) => {
    if (theme[k]) root.style.setProperty(v, theme[k]);
  });
}

// ══════════════════════════════════════════════
// LOAD STORY
// ══════════════════════════════════════════════
async function loadStory() {
  // Get file from URL param or localStorage
  const params = new URLSearchParams(window.location.search);
  let file = params.get('story') || localStorage.getItem('sf_game_file');

  if (!file) { showError('Aucune histoire spécifiée.'); return; }

  try {
    const r = await fetch(file);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    story = await r.json();
  } catch(e) {
    showError(`Impossible de charger le fichier :<br><code style="font-size:11px">${file}</code>`);
    return;
  }

  if (!story.scenes) { showError('Format JSON invalide.'); return; }

  // Apply theme
  if (story.theme) applyTheme(story.theme);

  // Init background (after theme so colors are correct)
  initCanvas();
  createParticles();

  // Init stats
  stats = {};
  (story.stats || []).forEach(s => { stats[s.id] = s.start || 0; });

  // Set title
  const title = story.name || 'Histoire';
  document.getElementById('game-title').textContent = title;
  document.getElementById('drawer-game-title').textContent = title;
  document.title = title;

  // Render stats bar
  renderStatsBar();

  // Find start scene
  const startScene = Object.values(story.scenes).find(s => s.isStart);
  if (!startScene) { showError('Aucune scène de départ définie.'); return; }

  // Hide loading
  hideLoading();

  // Go to start
  goToScene(startScene.id);
}

// ══════════════════════════════════════════════
// STATS BAR
// ══════════════════════════════════════════════
function renderStatsBar() {
  const bar = document.getElementById('stats-bar');
  const scroll = document.getElementById('scroll-area');
  if (!story.stats || !story.stats.length) {
    bar.classList.add('hidden');
    scroll.classList.remove('has-stats');
    return;
  }
  bar.classList.remove('hidden');
  scroll.classList.add('has-stats');
  updateStatsBar();
}

function updateStatsBar() {
  const bar = document.getElementById('stats-bar');
  if (!story.stats) return;
  bar.innerHTML = story.stats.map(s => {
    const val = stats[s.id] ?? s.start ?? 0;
    const max = s.max || 100;
    const pct = Math.round(Math.max(0, Math.min(val / max * 100, 100)));
    const color = s.color || 'var(--accent)';
    const display = s.id === 'credits' ? val + '¥' : val;
    return `<div class="stat-chip" style="--color:${color};--pct:${pct}%">
      <span class="stat-label">${s.label}</span>
      <span class="stat-value">${display}</span>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// SCENE ENGINE
// ══════════════════════════════════════════════
function goToScene(id, choiceText) {
  const scene = story.scenes[id];
  if (!scene) { showError('Scène introuvable : ' + id); return; }

  applySceneMedia(scene);

  // Log history
  if (currentId) history.push({ id: currentId, choice: choiceText || '' });
  currentId = id;

  // Update progress bar (rough estimate based on visited vs total)
  const total = Object.keys(story.scenes).length;
  const pct = Math.min(95, Math.round(history.length / total * 100));
  document.getElementById('progress-fill').style.width = pct + '%';

  // Update drawer scene count
  document.getElementById('drawer-scene-count').textContent =
    history.length + ' scène' + (history.length > 1 ? 's' : '') + ' visitée' + (history.length > 1 ? 's' : '');

  if (scene.isEnd) {
    renderEndScene(scene);
  } else {
    renderScene(scene);
  }

  // Scroll to top
  document.getElementById('scroll-area').scrollTo({ top: 0, behavior: 'smooth' });
}


// ══════════════════════════════════════════════
// IMMERSION EFFECTS — optional JSON fields
// scene.transition: fade | glitch | scanline | flash
// choice.clickEffect: pulse | shake | glitch | flash | vibrate
// choice.sound / scene.sound: click_neon | glitch | success | error
// ══════════════════════════════════════════════
function triggerOverlay(effect) {
  if (!effect || effect === 'none') return;
  const overlay = document.getElementById('fx-overlay');
  if (!overlay) return;
  overlay.className = '';
  void overlay.offsetWidth;
  overlay.className = effect === 'glitch' ? 'glitch' : 'flash';
  setTimeout(() => { overlay.className = ''; }, 450);
}

function playPresetSound(name) {
  if (!name || name === 'none') return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = playPresetSound.ctx || (playPresetSound.ctx = new AC());
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const presets = {
      click_neon: [740, 0.035, 'square', 0.025],
      confirm:    [900, 0.060, 'sine', 0.030],
      success:    [880, 0.090, 'sine', 0.030],
      error:      [180, 0.120, 'triangle', 0.035],
      glitch:     [120, 0.075, 'sawtooth', 0.020],
      hack:       [1320,0.050, 'square', 0.020],
      door_open:  [260, 0.080, 'triangle', 0.025],
      glass_break:[980, 0.070, 'sawtooth', 0.018],
      weapon_draw:[420, 0.055, 'sawtooth', 0.020],
      combat_start:[160,0.100, 'square', 0.026],
      steal:      [610, 0.060, 'triangle', 0.022],
      footstep:   [110, 0.045, 'sine', 0.020]
    };
    const [freq, dur, type, vol] = presets[name] || presets.click_neon;
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (name === 'hack' || name === 'glitch') {
      osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq / 3), ctx.currentTime + dur);
    }
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function tryPlayFileSound(name, folder = 'assets/sounds', ext = 'mp3') {
  if (!name || name === 'none') return;
  const audio = new Audio(`${folder}/${name}.${ext}`);
  audio.volume = 0.45;
  audio.play().catch(() => playPresetSound(name));
}

let bgMusic = null;
function playSceneMusic(name) {
  if (!name || name === 'none') return;
  const src = `assets/music/${name}.mp3`;
  if (!bgMusic) {
    bgMusic = new Audio();
    bgMusic.loop = true;
    bgMusic.volume = 0.28;
  }
  if (bgMusic.dataset.current === name) return;
  bgMusic.pause();
  bgMusic.src = src;
  bgMusic.dataset.current = name;
  bgMusic.play().catch(() => {
    // Le navigateur peut bloquer la musique avant le premier clic : normal.
  });
}

function sceneBgPresetClass(name) {
  return name ? `preset-${String(name).replace(/[^a-zA-Z0-9_-]/g, '')}` : '';
}

function applySceneMedia(scene) {
  const bg = document.getElementById('scene-bg');
  if (bg) {
    bg.className = '';
    bg.style.backgroundImage = '';
    if (scene.background) {
      const jpg = `assets/backgrounds/${scene.background}.jpg`;
      bg.style.backgroundImage = `url('${jpg}')`;
      bg.classList.add(sceneBgPresetClass(scene.background), 'visible');
    } else {
      bg.classList.remove('visible');
    }
  }
  if (scene.music) playSceneMusic(scene.music);
  if (scene.sound) playPresetSound(scene.sound);
}

function portraitHTML(scene) {
  if (!scene.portrait) return '';
  const label = String(scene.portrait).replace(/[_-]/g, ' ');
  const img = `assets/portraits/${scene.portrait}.png`;
  return `<div class="scene-portrait visible">
    <img src="${img}" alt="${escHtml(label)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'portrait-fallback',textContent:'◈'}))">
    <div>
      <div class="portrait-name">${escHtml(label)}</div>
      <div class="portrait-desc">Signal visuel détecté</div>
    </div>
  </div>`;
}

function playChoiceFeedback(choice) {
  const fx = choice?.clickEffect || 'pulse';
  const content = document.getElementById('content');
  if (navigator.vibrate) navigator.vibrate(fx === 'shake' ? 45 : 22);
  if (fx === 'flash' || fx === 'glitch') triggerOverlay(fx);
  if (content) {
    content.classList.remove('choice-shake','choice-pulse','choice-glitch');
    void content.offsetWidth;
    if (['shake','pulse','glitch'].includes(fx)) content.classList.add('choice-' + fx);
    setTimeout(() => content.classList.remove('choice-shake','choice-pulse','choice-glitch'), 350);
  }
  tryPlayFileSound(choice?.sound || 'click_neon');
}

function sceneTransitionClass(scene) {
  const t = scene?.transition || 'fade';
  return ['fade','glitch','scanline','flash'].includes(t) ? `transition-${t}` : 'transition-fade';
}

function renderScene(scene) {
  // Shuffle choices
  currentChoices = shuffleArray([...(scene.choices || [])]);
  // Check locked choices (stat requirements)
  const choicesHTML = currentChoices.map((c, i) => {
    const locked = isChoiceLocked(c);
    return `<button class="choice-btn${locked ? ' locked' : ''} fx-${c.clickEffect || 'pulse'}"
      style="${locked ? 'opacity:0.35;cursor:not-allowed' : ''}"
      onclick="${locked ? '' : `pickChoice(${i})`}"
      ${locked ? 'disabled' : ''}>
      <span class="choice-index">— ${String(i+1).padStart(2,'0')}</span>
      ${escHtml(c.text)}
      ${locked ? `<span style="display:block;font-size:11px;color:var(--text3);margin-top:4px;font-family:'DM Mono',monospace">
        ${getLockedReason(c)}</span>` : ''}
    </button>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="scene-in ${sceneTransitionClass(scene)}">
      <div class="scene-layout ${scene.portrait ? 'with-portrait' : ''}">
        ${portraitHTML(scene)}
        <div>
          ${scene.location
            ? `<div class="location-pill">${escHtml(scene.location)}</div>`
            : ''}
          <div class="scene-text">${formatText(scene.text || '')}</div>
          <div id="choices-area">${choicesHTML}</div>
        </div>
      </div>
    </div>`;
}

function renderEndScene(scene) {
  document.getElementById('progress-fill').style.width = '100%';

  const statsRows = (story.stats || []).map(s => {
    const val = stats[s.id] ?? s.start ?? 0;
    return `<div class="end-stat-row">
      <span class="end-stat-label">${s.label}</span>
      <span class="end-stat-val" style="color:${s.color || 'var(--accent)'}">${val}</span>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div id="end-screen" class="scene-in ${sceneTransitionClass(scene)}">
      ${portraitHTML(scene)}
      <div class="end-title">✦ ${escHtml(scene.title || 'Fin')} ✦</div>
      ${scene.location
        ? `<div class="location-pill" style="justify-content:center;margin-bottom:16px">${escHtml(scene.location)}</div>`
        : ''}
      <div class="scene-text">${formatText(scene.text || '')}</div>
      ${statsRows ? `<div class="end-stats">${statsRows}</div>` : ''}
      <div class="end-buttons">
        <button class="end-btn primary" onclick="restartGame()">↺ Recommencer</button>
        <button class="end-btn" onclick="window.location.href='index.html'">← Menu principal</button>
      </div>
    </div>`;
}

function pickChoice(index) {
  const choice = currentChoices[index];
  if (!choice || !choice.vers) return;

  playChoiceFeedback(choice);

  // Apply stat effects
  let notifParts = [];
  if (choice.effects) {
    choice.effects.forEach(eff => {
      if (stats[eff.stat] !== undefined) {
        stats[eff.stat] = Math.max(0, stats[eff.stat] + (eff.val || 0));
        const sign = eff.val > 0 ? '+' : '';
        const statDef = story.stats.find(s => s.id === eff.stat);
        notifParts.push(`${statDef ? statDef.label : eff.stat} ${sign}${eff.val}`);
      }
    });
    updateStatsBar();
  }

  // Show notification if effects
  if (notifParts.length) {
    const notif = document.createElement('div');
    notif.className = 'stat-notif';
    notif.innerHTML = '⚡ ' + notifParts.join(' · ');
    document.getElementById('content').prepend(notif);
    setTimeout(() => notif.remove(), 2500);
  }

  setTimeout(() => goToScene(choice.vers, choice.text || ''), 120);
}

// ══════════════════════════════════════════════
// LOCKED CHOICES
// ══════════════════════════════════════════════
function isChoiceLocked(choice) {
  if (!choice.requires) return false;
  return Object.entries(choice.requires).some(([k, v]) => (stats[k] ?? 0) < v);
}

function getLockedReason(choice) {
  if (!choice.requires) return '';
  const parts = Object.entries(choice.requires)
    .filter(([k, v]) => (stats[k] ?? 0) < v)
    .map(([k, v]) => {
      const s = story.stats?.find(s => s.id === k);
      return `${s ? s.label : k} insuffisant (${stats[k] ?? 0}/${v})`;
    });
  return parts.join(', ');
}

// ══════════════════════════════════════════════
// HISTORY DRAWER
// ══════════════════════════════════════════════
let historyOpen = false;
function toggleHistory() {
  historyOpen = !historyOpen;
  const log = document.getElementById('history-log');
  log.classList.toggle('open', historyOpen);
  if (historyOpen) {
    log.innerHTML = history.slice(-15).reverse().map(h => {
      const scene = story.scenes[h.id];
      return `<div class="history-entry">
        <span class="h-scene">[${scene ? escHtml(scene.title || h.id) : h.id}]</span>
        ${h.choice ? ' → ' + escHtml(h.choice) : ''}
      </div>`;
    }).join('') || '<div class="history-entry" style="opacity:0.5">Aucune entrée</div>';
  }
}

// ══════════════════════════════════════════════
// MENU
// ══════════════════════════════════════════════
function openMenu() { document.getElementById('menu-overlay').classList.add('open'); }
function closeMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
function handleMenuClick(e) {
  if (e.target === document.getElementById('menu-overlay')) closeMenu();
}

// ══════════════════════════════════════════════
// RESTART
// ══════════════════════════════════════════════
function restartGame() {
  stats = {};
  (story.stats || []).forEach(s => { stats[s.id] = s.start || 0; });
  history = [];
  currentId = null;
  document.getElementById('progress-fill').style.width = '0%';
  updateStatsBar();
  const startScene = Object.values(story.scenes).find(s => s.isStart);
  if (startScene) goToScene(startScene.id);
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function formatText(text) {
  // Support basic markdown-like: **bold** → accent2, *italic* → accent
  return escHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,     '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function hideLoading() {
  const el = document.getElementById('loading');
  el.classList.add('fade');
  setTimeout(() => el.style.display = 'none', 450);
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').innerHTML = msg;
  document.getElementById('error-screen').classList.add('show');
}

// ══════════════════════════════════════════════
// BACKGROUND — canvas stars + particles
// ══════════════════════════════════════════════
function hexToRgb(hex) {
  // handles #rrggbb
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return isNaN(r) ? null : {r,g,b};
}

function getAccentRgb() {
  const accent = getComputedStyle(document.documentElement)
    .getPropertyValue('--accent').trim();
  return hexToRgb(accent) || {r:124, g:109, b:250};
}

function initCanvas() {
  const canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const stars = Array.from({length:60}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.2,
    a: Math.random() * 0.25 + 0.04,
    speed: Math.random() * 0.3 + 0.08,
    phase: Math.random() * Math.PI * 2
  }));

  let frame = 0;
  let rgb = getAccentRgb();

  function draw() {
    // Refresh color every 120 frames in case theme changes
    if (frame % 120 === 0) rgb = getAccentRgb();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const twinkle = s.a * (0.6 + 0.4 * Math.sin(frame * s.speed * 0.05 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${twinkle})`;
      ctx.fill();
    });
    frame++;
    requestAnimationFrame(draw);
  }
  draw();

  window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars.forEach(s => {
      s.x = Math.random() * canvas.width;
      s.y = Math.random() * canvas.height;
    });
  });
}

function createParticles() {
  // Remove old particles if restarting
  document.querySelectorAll('.particle').forEach(p => p.remove());
  const count = window.innerWidth < 480 ? 10 : 16;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size    = Math.random() * 2 + 1;
    const delay   = Math.random() * 14;
    const duration = 12 + Math.random() * 16;
    const left    = Math.random() * 100;
    const drift   = (Math.random() - 0.5) * 80;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}vw; bottom:-10px;
      --drift:${drift}px;
      animation-duration:${duration}s;
      animation-delay:${delay}s;
      z-index:2;
    `;
    document.body.appendChild(p);
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadStory();
</script>
</body>
</html>
