<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StoryForge</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── BACKGROUND ── */
#bg-canvas {
  position:fixed; inset:0; z-index:0;
  pointer-events:none;
}
.bg-gradient {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%,   var(--glow-top,    rgba(124,109,250,0.05)) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 20% 100%,  var(--glow-bottom, rgba(124,109,250,0.04)) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 80%,   rgba(0,0,0,0.06) 0%, transparent 50%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg2) 50%, var(--bg) 100%);
}
.particle {
  position:fixed; border-radius:50%;
  background:var(--accent);
  pointer-events:none; z-index:1;
  animation: float-up linear infinite;
  opacity:0;
}
@keyframes slide-up {
  from { transform:translateY(100%); opacity:0; }
  to   { transform:translateY(0);    opacity:1; }
}
@keyframes fade-in {
  from { opacity:0; } to { opacity:1; }
}
@keyframes float-up {
  0%   { transform:translateY(0) translateX(0) scale(1); opacity:0; }
  10%  { opacity:0.5; }
  90%  { opacity:0.15; }
  100% { transform:translateY(-100vh) translateX(var(--drift)) scale(0.3); opacity:0; }
}

/* ── RESET ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }

/* ── CSS VARS — overridden by theme ── */
:root {
  --bg:      #0e0e12;
  --bg2:     #14141a;
  --bg3:     #1c1c24;
  --bg4:     #24242e;
  --border:  #2e2e3a;
  --accent:  #7c6dfa;
  --accent2: #fa6d8f;
  --accent3: #6dfabc;
  --text:    #e8e8f0;
  --text2:   #9090a8;
  --text3:   #5a5a72;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  line-height: 1.75;
}

/* ── TOPBAR ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 52px; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  background: color-mix(in srgb, var(--bg2) 85%, transparent);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  transition: opacity .35s ease, transform .35s ease;
}
#topbar.ui-hidden {
  opacity: 0; pointer-events: none;
  transform: translateY(-100%);
}
#btn-back {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
  text-decoration: none;
}
#btn-back:hover { border-color: var(--accent); color: var(--text); }

#game-title {
  font-family: 'Cinzel', serif;
  font-size: 14px; font-weight: 600;
  color: var(--text); letter-spacing: 1px;
  flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

#btn-menu {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
#btn-menu:hover { border-color: var(--accent); color: var(--text); }

#btn-fullscreen {
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
#btn-fullscreen:hover { border-color: var(--accent); color: var(--text); }

/* ── STATS BAR ── */
#stats-bar {
  position: fixed; top: 52px; left: 0; right: 0;
  z-index: 99;
  background: color-mix(in srgb, var(--bg2) 80%, transparent);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none;
  backdrop-filter: blur(10px);
  transition: opacity .35s ease, transform .35s ease;
}
#stats-bar::-webkit-scrollbar { display: none; }
#stats-bar.hidden { display: none; }
#stats-bar.ui-hidden { opacity:0; pointer-events:none; transform:translateY(-8px); }

.stat-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 10px;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.stat-chip::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: var(--pct, 50%);
  background: var(--color, var(--accent));
  opacity: 0.12;
  transition: width .5s ease;
}
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: 1px;
  color: var(--text3); text-transform: uppercase;
}
.stat-value {
  font-family: 'DM Mono', monospace;
  font-size: 12px; font-weight: 400;
  color: var(--color, var(--accent));
}

/* ── SCROLL AREA ── */
#scroll-area {
  position: fixed;
  top: 52px; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  scroll-behavior: smooth;
  z-index: 10;
  transition: top .35s ease;
}
#scroll-area.has-stats { top: 92px; }
#scroll-area.ui-hidden { top: 0; }
#scroll-area::-webkit-scrollbar { width: 3px; }
#scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── MODE PAYSAGE ── */
@media (orientation:landscape) and (max-height:450px) {
  #scroll-area { top: 52px; }
  #scroll-area.ui-hidden { top: 0; }
  #content { padding: 16px 20px 100px; max-width: 700px; }
}

/* ── MAIN CONTENT ── */
#content {
  max-width: 600px;
  margin: 0 auto;
  padding: 28px 20px 160px;
}

/* ── LOCATION PILL ── */
.location-pill {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--accent2); letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 20px;
  opacity: 0.8;
}
.location-pill::before {
  content: '◈';
  animation: loc-pulse 2.5s infinite;
}
@keyframes loc-pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── NARRATOR ── */
.narrator-text {
  font-family:'Cormorant Garamond', serif;
  font-size:17px; font-style:italic;
  color:var(--text); line-height:1.8;
  margin-bottom:20px; padding:14px 18px;
  border-left:3px solid var(--accent);
  background:color-mix(in srgb, var(--accent) 8%, transparent);
  border-radius:0 8px 8px 0;
}
.scene-text {
  font-size: 17px; line-height: 1.85;
  color: var(--text); margin-bottom: 32px;
  font-weight: 300;
}
.scene-text em {
  color: var(--accent); font-style: normal; font-weight: 500;
}
.scene-text strong {
  color: var(--accent2); font-weight: 600;
}

/* ── STAT NOTIFICATION ── */
.stat-notif {
  display: flex; align-items: center; gap: 8px;
  background: color-mix(in srgb, var(--accent) 8%, transparent);
  border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent);
  border-radius: 8px; padding: 8px 14px;
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--accent); margin-bottom: 20px;
  animation: notif-in .4s ease;
}
@keyframes notif-in {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── TYPEWRITER ── */
.cursor {
  display:inline-block;
  width:2px; height:1em;
  background:var(--accent);
  margin-left:2px;
  vertical-align:text-bottom;
  animation:cur-blink .7s step-end infinite;
  border-radius:1px; opacity:0.8;
}
@keyframes cur-blink {
  0%,100% { opacity:0.8; }
  50%      { opacity:0; }
}

/* ── CHOICES ── */
#choices-area {
  display: flex; flex-direction: column; gap: 10px;
}
#choices-area.hidden {
  visibility:hidden; opacity:0; pointer-events:none;
}
#choices-area.reveal {
  visibility:visible;
  animation:choices-in .5s ease forwards;
}
@keyframes choices-in {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

.choice-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  color: var(--text);
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 400;
  cursor: pointer; text-align: left;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative; overflow: hidden;
  line-height: 1.5;
}
.choice-btn::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--accent);
  transform: scaleY(0);
  transition: transform .2s ease;
  box-shadow: 0 0 8px var(--accent);
}
.choice-btn:hover {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent) 6%, var(--bg3));
  transform: translateX(4px);
  color: var(--text);
}
.choice-btn:hover::before { transform: scaleY(1); }
.choice-btn:active { transform: translateX(2px) scale(0.99); }

/* ── TIMER ── */
#choice-timer {
  margin-top: 8px;
  display: none;
}
#choice-timer.active { display: block; }
.timer-label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text3); letter-spacing: 2px;
  margin-bottom: 5px;
  display: flex; justify-content: space-between; align-items: center;
}
.timer-label span { color: var(--accent2); }
.timer-track {
  height: 3px; background: var(--bg3);
  border-radius: 2px; overflow: hidden;
}
.timer-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  transition: width linear;
  box-shadow: 0 0 6px var(--accent);
}
.timer-fill.urgent {
  background: linear-gradient(90deg, #fa6d8f, #ff4444);
  box-shadow: 0 0 8px #fa6d8f;
  animation: timer-pulse .4s ease infinite alternate;
}
@keyframes timer-pulse {
  from { opacity: 1; }
  to   { opacity: 0.6; }
}

/* ── END SCREEN ── */
#end-screen {
  text-align: center; padding: 40px 20px;
  animation: scene-in .6s ease;
}
.end-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(18px, 6vw, 28px);
  font-weight: 600; letter-spacing: 3px;
  color: var(--accent); margin-bottom: 20px;
  text-shadow: 0 0 30px color-mix(in srgb, var(--accent) 40%, transparent);
}
.end-stats {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin: 24px 0;
  text-align: left;
}
.end-stat-row {
  display: flex; justify-content: space-between;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.end-stat-row:last-child { border-bottom: none; }
.end-stat-label { color: var(--text2); font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1px; }
.end-stat-val { color: var(--accent); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 400; }

.end-text {
  font-size: 15px; color: var(--text2);
  font-style: italic; line-height: 1.7;
  margin-bottom: 32px;
}
.end-buttons { display: flex; flex-direction: column; gap: 10px; max-width: 280px; margin: 0 auto; }
.end-btn {
  padding: 14px 24px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  color: var(--text2); font-family: 'Cinzel', serif;
  font-size: 12px; letter-spacing: 2px; cursor: pointer;
  transition: all .2s;
}
.end-btn:hover { border-color: var(--accent); color: var(--accent); }
.end-btn.primary {
  background: var(--accent); border-color: var(--accent);
  color: var(--bg); font-weight: 600;
}
.end-btn.primary:hover { opacity: 0.9; }

/* ── TRANSITIONS D'ARRIVÉE ── */
@keyframes fx-fade {
  from { opacity:0; } to { opacity:1; }
}
@keyframes fx-flash {
  0%   { background:rgba(255,255,255,0.25); }
  100% { background:transparent; }
}
@keyframes fx-glitch {
  0%   { transform:translate(0); filter:none; }
  15%  { transform:translate(-4px,2px); filter:hue-rotate(90deg) brightness(1.4); }
  30%  { transform:translate(4px,-2px); filter:hue-rotate(-90deg); }
  45%  { transform:translate(-2px,0); filter:brightness(0.6); }
  60%  { transform:translate(2px,2px); filter:hue-rotate(45deg); }
  75%  { transform:translate(0,-1px); filter:none; }
  100% { transform:translate(0); filter:none; }
}
@keyframes fx-scanline {
  0%   { background-position: 0 -100vh; opacity:0.6; }
  100% { background-position: 0 100vh; opacity:0; }
}

.fx-fade    { animation: fx-fade .5s ease forwards; }
.fx-flash   { animation: fx-flash .3s ease forwards; }
.fx-glitch  { animation: fx-glitch .4s ease forwards; }

/* overlay scanlines */
#fx-overlay {
  position:fixed; inset:0; z-index:50;
  pointer-events:none; opacity:0;
}
#fx-overlay.flash {
  background:white;
  animation:fx-flash .25s ease forwards;
}
#fx-overlay.glitch-flicker {
  animation:fx-glitch-overlay .35s ease forwards;
}
@keyframes fx-glitch-overlay {
  0%,100% { opacity:0; }
  10%  { opacity:1; background:rgba(0,245,255,0.15); transform:translateX(-3px); }
  20%  { opacity:1; background:rgba(255,0,170,0.15); transform:translateX(3px); }
  35%  { opacity:0.5; background:rgba(0,245,255,0.08); transform:translateX(-1px); }
  50%  { opacity:0; }
}
#fx-overlay.scanlines {
  background:repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(255,255,255,0.04) 2px, rgba(255,255,255,0.04) 4px
  );
  animation:fx-scanline-pass .5s ease forwards;
}
@keyframes fx-scanline-pass {
  0%   { opacity:1; transform:translateY(-100%); }
  100% { opacity:0; transform:translateY(100%); }
}

/* ── EFFETS AU CLIC ── */
@keyframes btn-pulse {
  0%   { box-shadow:0 0 0 0 var(--accent); }
  50%  { box-shadow:0 0 0 10px rgba(124,109,250,0); transform:scale(1.02); }
  100% { box-shadow:0 0 0 0 rgba(124,109,250,0); transform:scale(1); }
}
@keyframes btn-shake {
  0%,100% { transform:translateX(0); }
  20%  { transform:translateX(-6px); }
  40%  { transform:translateX(6px); }
  60%  { transform:translateX(-4px); }
  80%  { transform:translateX(4px); }
}
@keyframes btn-flash {
  0%   { background:var(--accent); color:var(--bg); }
  100% { background:var(--bg3); color:var(--text); }
}
@keyframes btn-glitch {
  0%,100% { transform:translate(0); filter:none; }
  25% { transform:translate(-3px,1px); filter:hue-rotate(90deg); }
  50% { transform:translate(3px,-1px); filter:hue-rotate(-90deg); }
  75% { transform:translate(-1px,0); filter:brightness(1.5); }
}

.btn-fx-pulse   { animation:btn-pulse .4s ease forwards; }
.btn-fx-shake   { animation:btn-shake .35s ease forwards; }
.btn-fx-flash   { animation:btn-flash .3s ease forwards; }
.btn-fx-glitch  { animation:btn-glitch .3s ease forwards; }
/* ── ILLUSTRATION ── */
.scene-illustration {
  width:100%; margin-bottom:20px;
  border-radius:12px; overflow:hidden;
  border:1px solid var(--border);
  background:var(--bg3);
  display:flex; align-items:center; justify-content:center;
  aspect-ratio:1/1; max-width:280px;
  margin-left:auto; margin-right:auto;
  animation:scene-in .5s ease;
}
.scene-illustration img {
  width:100%; height:100%;
  object-fit:contain; display:block;
  border-radius:12px;
}

.scene-in { animation: scene-in .45s ease; }
@keyframes scene-in {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── PLAYER NAME POPUP ── */
#name-overlay {
  position:fixed; inset:0; z-index:400;
  background:rgba(0,0,0,0.85);
  display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(8px);
  transition:opacity .3s;
}
#name-overlay.hide { opacity:0; pointer-events:none; }
#name-box {
  width:100%; max-width:340px; margin:24px;
  background:var(--bg2); border:1px solid var(--border);
  border-radius:16px; padding:32px 28px;
  text-align:center;
}
#name-box .name-icon { font-size:32px; margin-bottom:12px; }
#name-box .name-title {
  font-family:'Cinzel',serif; font-size:16px;
  font-weight:600; color:var(--text);
  letter-spacing:2px; margin-bottom:6px;
}
#name-box .name-sub {
  font-size:13px; color:var(--text2);
  font-style:italic; margin-bottom:20px;
}
#name-input {
  width:100%; background:var(--bg3);
  border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:'Cormorant Garamond',serif;
  font-size:18px; padding:12px 16px; outline:none;
  text-align:center; letter-spacing:1px;
  transition:border-color .2s; margin-bottom:16px;
}
#name-input:focus { border-color:var(--accent); }
#name-confirm {
  width:100%; padding:13px;
  border:1px solid var(--accent);
  background:color-mix(in srgb, var(--accent) 15%, transparent);
  color:var(--accent); font-family:'Cinzel',serif;
  font-size:12px; font-weight:600; letter-spacing:3px;
  border-radius:8px; cursor:pointer; transition:all .2s;
}
#name-confirm:hover { background:var(--accent); color:var(--bg); }
#name-skip {
  background:none; border:none; color:var(--text3);
  font-family:'Lato',sans-serif; font-size:11px;
  letter-spacing:1px; cursor:pointer; margin-top:10px;
  display:block; width:100%; transition:color .2s;
}
#name-skip:hover { color:var(--text2); }
#loading {
  position: fixed; inset: 0;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0; z-index: 500;
  transition: opacity .8s ease;
}
#loading.fade { opacity: 0; pointer-events: none; }

/* Studio line */
.intro-studio {
  font-family:'Cinzel',serif; font-size:13px;
  letter-spacing:6px; text-transform:uppercase;
  color:rgba(255,255,255,0.85);
  text-shadow: 0 0 30px rgba(255,255,255,0.2);
  opacity:0; animation:intro-rise .8s ease forwards;
  animation-delay:.5s;
}
/* Divider */
.intro-divider {
  width:0; height:1px; background:rgba(255,255,255,0.2);
  margin:18px 0; animation:intro-expand .8s ease forwards;
  animation-delay:1.0s;
}
@keyframes intro-expand { from{width:0;} to{width:140px;} }

/* Story title */
.intro-title {
  font-family:'Cinzel',serif;
  font-size:clamp(18px, 5.5vw, 34px);
  font-weight:600; letter-spacing:3px;
  color:rgba(255,255,255,0);
  text-align:center; padding:0 28px;
  opacity:0; animation:intro-title-in 1.2s ease forwards;
  animation-delay:1.5s;
}
@keyframes intro-title-in {
  0%   { opacity:0; color:rgba(255,255,255,0); transform:translateY(8px); }
  50%  { opacity:1; color:rgba(255,255,255,0.9); transform:translateY(0); }
  100% { opacity:1; color:rgba(255,255,255,0.85); }
}
/* Pegasus — masqué, intégré dans studio */
.intro-pegasus { display:none; }
@keyframes intro-rise {
  from { opacity:0; transform:translateY(4px); }
  to   { opacity:1; transform:translateY(0); }
}
/* Loading dots */
.loading-dots {
  position:absolute; bottom:44px;
  display:flex; gap:6px;
  opacity:0; animation:intro-rise .4s ease forwards;
  animation-delay:3.2s;
}
.loading-dot {
  width:4px; height:4px; border-radius:50%;
  background:rgba(255,255,255,0.3);
  animation:dot-pulse .8s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay:.15s; }
.loading-dot:nth-child(3) { animation-delay:.3s; }
@keyframes dot-pulse {
  0%,100% { opacity:.3; transform:scale(1); }
  50%     { opacity:1;  transform:scale(1.3); }
}
.loading-label { display:none; }

/* ── ERROR ── */
#error-screen {
  display: none;
  position: fixed; inset: 0;
  background: var(--bg);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  text-align: center; padding: 32px;
}
#error-screen.show { display: flex; }
.error-icon { font-size: 40px; opacity: 0.4; }
.error-msg { font-size: 14px; color: var(--text2); max-width: 300px; line-height: 1.6; }
.error-btn {
  padding: 10px 24px; border: 1px solid var(--border);
  border-radius: 8px; background: none; color: var(--text2);
  font-family: 'Cinzel', serif; font-size: 12px;
  letter-spacing: 2px; cursor: pointer; transition: all .2s;
}
.error-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── MENU DRAWER ── */
#menu-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0); pointer-events: none;
  transition: background .25s;
}
#menu-overlay.open { background: rgba(0,0,0,0.6); pointer-events: all; }
#menu-drawer {
  position: absolute; top: 0; right: 0; bottom: 0;
  width: 260px; background: var(--bg2);
  border-left: 1px solid var(--border);
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column; overflow: hidden;
}
#menu-overlay.open #menu-drawer { transform: translateX(0); }
.drawer-header {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.drawer-title {
  font-family: 'Cinzel', serif; font-size: 13px;
  font-weight: 600; letter-spacing: 2px; color: var(--text);
}
.drawer-subtitle {
  font-size: 12px; color: var(--text3);
  font-style: italic; margin-top: 3px;
}
.drawer-body { flex: 1; padding: 12px; overflow-y: auto; }
.drawer-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border-radius: 8px;
  border: none; background: none; width: 100%;
  text-align: left; color: var(--text2);
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; cursor: pointer; transition: all .15s;
}
.drawer-item:hover { background: var(--bg3); color: var(--text); }
.drawer-item-icon { font-size: 18px; width: 24px; text-align: center; }

/* ── HISTORY LOG ── */
#history-log {
  display: none; padding: 12px;
  border-top: 1px solid var(--border);
  max-height: 200px; overflow-y: auto;
}
#history-log.open { display: block; }
.history-entry {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--text3); padding: 4px 0;
  border-bottom: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
  line-height: 1.4;
}
.history-entry .h-scene { color: var(--accent2); opacity: 0.7; }

/* ── FAB MARQUE-PAGE ── */
#fab-wrap {
  position:fixed; bottom:24px; right:16px; z-index:200;
  display:flex; flex-direction:column; align-items:flex-end; gap:10px;
  transition: opacity .35s ease, transform .35s ease;
}
#fab-wrap.ui-hidden { opacity:0; pointer-events:none; transform:translateY(12px); }

/* ── IMMERSIVE DOT ── */
#immersive-dot {
  position:fixed; top:16px; left:16px; z-index:200;
  width:10px; height:10px; border-radius:50%;
  background:var(--accent); opacity:0.5;
  cursor:pointer; transition:all .2s;
  box-shadow: 0 0 0 0 var(--accent);
  animation: dot-breathe 3s ease-in-out infinite;
}
#immersive-dot:hover { opacity:1; transform:scale(1.3); }
#immersive-dot.ui-visible { opacity:0; pointer-events:none; }

@keyframes dot-breathe {
  0%,100% { box-shadow: 0 0 0 0 rgba(124,109,250,0.4); }
  50%      { box-shadow: 0 0 0 5px rgba(124,109,250,0); }
}
#fab-main {
  width:50px; height:50px; border-radius:50%;
  background:var(--accent); border:none; color:#fff;
  font-size:22px; cursor:pointer;
  box-shadow:0 4px 20px color-mix(in srgb, var(--accent) 50%, transparent);
  display:flex; align-items:center; justify-content:center;
  transition:transform .2s, box-shadow .2s;
  z-index:2; position:relative;
}
#fab-main:active { transform:scale(0.93); }
#fab-main.open { transform:rotate(45deg); }

.fab-action {
  display:flex; align-items:center; gap:10px;
  opacity:0; transform:translateY(10px) scale(0.9);
  transition:all .2s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.fab-action.show { opacity:1; transform:translateY(0) scale(1); pointer-events:all; }
.fab-action:nth-child(1) { transition-delay:.05s; }
.fab-action:nth-child(2) { transition-delay:.1s; }

.fab-label {
  background:var(--bg2); border:1px solid var(--border);
  border-radius:8px; padding:5px 10px;
  font-family:'DM Mono',monospace; font-size:11px;
  color:var(--text2); white-space:nowrap;
  box-shadow:0 2px 8px #00000044;
}
.fab-btn {
  width:42px; height:42px; border-radius:50%;
  border:1px solid var(--border);
  background:var(--bg2); color:var(--text);
  font-size:18px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 2px 12px #00000044;
  transition:all .15s; flex-shrink:0;
}
.fab-btn:hover { border-color:var(--accent); background:var(--bg3); }
.fab-btn:active { transform:scale(0.9); }

/* Toast bookmark */
#bm-toast {
  position:fixed; bottom:90px; left:50%;
  transform:translateX(-50%);
  background:var(--bg2); border:1px solid var(--accent);
  border-radius:10px; padding:10px 18px;
  font-family:'DM Mono',monospace; font-size:12px;
  color:var(--accent); z-index:300;
  opacity:0; transition:opacity .3s; pointer-events:none;
  white-space:nowrap;
}
#bm-toast.show { opacity:1; }
#progress-bar {
  position: fixed; top: 52px; left: 0; right: 0;
  height: 2px; z-index: 98;
  background: var(--border);
  transition: opacity .35s ease;
}
#progress-bar.ui-hidden { opacity:0; }
#progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width .5s ease;
  box-shadow: 0 0 6px var(--accent);
  width: 0%;
}
</style>
</head>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let story      = null;
let stats      = {};
let history    = [];
let currentId  = null;
let playerName = localStorage.getItem('sf_player_name') || '';

// ══════════════════════════════════════════════
// THEME — apply from story.theme
// ══════════════════════════════════════════════
function applyTheme(theme) {
  if (!theme) return;
  const root = document.documentElement;
  const map = {
    bg:'--bg', bg2:'--bg2', bg3:'--bg3', bg4:'--bg4',
    border:'--border', accent:'--accent',
    accent2:'--accent2', accent3:'--accent3',
    text:'--text', text2:'--text2', text3:'--text3'
  };
  Object.entries(map).forEach(([k, v]) => {
    if (theme[k]) root.style.setProperty(v, theme[k]);
  });
}

// ══════════════════════════════════════════════
// LOAD STORY
// ══════════════════════════════════════════════
async function loadStory() {
  // Get file from URL param or localStorage
  const params = new URLSearchParams(window.location.search);

  // ── MODE TEST depuis l'éditeur ──
  if (params.get('test') === '1') {
    // localStorage au lieu de sessionStorage (fonctionne entre onglets sur mobile)
    const testData = localStorage.getItem('sf_test_story');
    if (testData) {
      try {
        story = JSON.parse(testData);
        localStorage.removeItem('sf_test_story'); // nettoyer après usage
        if (story._testMode && story._testSceneId) {
          Object.values(story.scenes).forEach(s => s.isStart = false);
          story.scenes[story._testSceneId].isStart = true;
        }
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999;background:#fa6d8f;color:#fff;font-family:monospace;font-size:11px;text-align:center;padding:3px;letter-spacing:1px';
        banner.textContent = '▶ MODE TEST — ' + (story.scenes[story._testSceneId]?.title || 'départ');
        document.body.appendChild(banner);
        document.getElementById('topbar').style.marginTop = '20px';
        document.getElementById('progress-bar').style.top = '72px';
        document.getElementById('stats-bar').style.top = '72px';
      } catch(e) {
        showError('Erreur mode test : ' + e.message);
        return;
      }
    } else {
      showError('Données de test introuvables.<br>Relance le test depuis l\'éditeur.');
      return;
    }
  }

  let file = params.get('story') || localStorage.getItem('sf_game_file');

  if (!story) {
    if (!file) { showError('Aucune histoire spécifiée.'); return; }
    try {
      const r = await fetch(file);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      story = await r.json();
    } catch(e) {
      showError(`Impossible de charger le fichier :<br><code style="font-size:11px">${file}</code>`);
      return;
    }
    if (!story.scenes) { showError('Format JSON invalide.'); return; }
  }

  // Apply theme
  if (story.theme) applyTheme(story.theme);

  // Init background (after theme so colors are correct)
  initCanvas();
  createParticles();

  // Init stats
  stats = {};
  (story.stats || []).forEach(s => { stats[s.id] = s.start || 0; });

  // Set title
  const title = story.name || 'Histoire';
  document.getElementById('game-title').textContent = title;
  document.getElementById('drawer-game-title').textContent = title;
  document.title = title;

  // Render stats bar
  renderStatsBar();

  // Find start scene
  const startScene = Object.values(story.scenes).find(s => s.isStart);
  if (!startScene) { showError('Aucune scène de départ définie.'); return; }

  // ── INTRO CINÉMA ──
  const lang = localStorage.getItem('sf_lang') || 'fr';
  const introTitle  = document.getElementById('intro-title');
  const introStudio = document.getElementById('intro-studio');
  const introPegasus = document.getElementById('intro-pegasus');
  const introDivider = document.querySelector('.intro-divider');

  // Reset animations pour que ça rejoue à chaque fois
  [introTitle, introStudio, introPegasus, introDivider].forEach(el => {
    if (!el) return;
    el.style.animation = 'none';
    el.style.opacity = '0';
    el.style.width = el === introDivider ? '0' : '';
    el.offsetHeight; // force reflow
    el.style.animation = '';
  });

  if (introTitle)   introTitle.textContent  = story.name || '';
  if (introStudio)  introStudio.textContent = {fr:'Une production PegasusCorp',en:'A PegasusCorp Production',es:'Una producción PegasusCorp'}[lang]||'Une production PegasusCorp';
  if (introPegasus) introPegasus.textContent = 'PegasusCorp';

  // Attendre 4.5s pour laisser l'animation se jouer, puis fondu
  setTimeout(() => {
    hideLoading();
    applyGameUI();
    showUI();
    const savedData = JSON.parse(localStorage.getItem(getSaveKey()) || 'null');
    if (savedData && savedData.sceneId && story.scenes[savedData.sceneId]) {
      showResumePrompt(savedData, startScene.id);
    } else if (story.askPlayerName && !playerName) {
      showNamePopup();
    } else {
      trackStats("story_start"); goToScene(startScene.id);
    }
  }, 4500);
}

function showResumePrompt(savedData, startSceneId) {
  const lang = localStorage.getItem('sf_lang') || 'fr';
  const t = {
    fr: { title:'Reprendre ?', sub:`Dernière scène : "${savedData.sceneTitle}"`, resume:'Reprendre', restart:'Recommencer' },
    en: { title:'Resume?',     sub:`Last scene: "${savedData.sceneTitle}"`,      resume:'Resume',    restart:'Restart'    },
    es: { title:'¿Continuar?', sub:`Última escena: "${savedData.sceneTitle}"`,   resume:'Continuar', restart:'Reiniciar'  }
  }[lang] || { title:'Reprendre ?', sub:`Scène : "${savedData.sceneTitle}"`, resume:'Reprendre', restart:'Recommencer' };

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)';
  overlay.innerHTML = `
    <div style="width:100%;max-width:320px;margin:24px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:28px 24px;text-align:center">
      <div style="font-size:28px;margin-bottom:12px">🔖</div>
      <div style="font-family:'Cinzel',serif;font-size:15px;color:var(--text);letter-spacing:2px;margin-bottom:8px">${t.title}</div>
      <div style="font-size:12px;color:var(--text2);font-style:italic;margin-bottom:20px">${t.sub}</div>
      <button id="resume-btn" style="width:100%;padding:12px;border:1px solid var(--accent);background:rgba(64,128,255,0.15);color:var(--accent);font-family:'Cinzel',serif;font-size:12px;letter-spacing:2px;border-radius:8px;cursor:pointer;margin-bottom:10px">${t.resume}</button>
      <button id="restart-btn" style="width:100%;padding:10px;border:1px solid var(--border);background:none;color:var(--text2);font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;border-radius:8px;cursor:pointer">${t.restart}</button>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById('resume-btn').onclick = () => {
    overlay.remove();
    loadSavedProgress();
  };
  document.getElementById('restart-btn').onclick = () => {
    overlay.remove();
    if (story.askPlayerName && !playerName) showNamePopup();
    else goToScene(startSceneId);
  };
}

function showNamePopup() {
  const overlay = document.getElementById('name-overlay');
  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('name-input').focus(), 300);

  // Adapter le texte selon la langue
  const lang = localStorage.getItem('sf_lang') || 'fr';
  const texts = {
    fr: { title:'Qui êtes-vous ?',     sub:'Entrez votre nom pour personnaliser l\'aventure', btn:'COMMENCER', skip:'Passer' },
    en: { title:'Who are you?',        sub:'Enter your name to personalise the adventure',    btn:'START',     skip:'Skip'  },
    es: { title:'¿Quién eres?',        sub:'Escribe tu nombre para personalizar la aventura', btn:'EMPEZAR',   skip:'Omitir'}
  };
  const t = texts[lang] || texts.fr;
  document.getElementById('name-title').textContent   = t.title;
  document.getElementById('name-sub').textContent     = t.sub;
  document.getElementById('name-confirm').textContent = t.btn;
  document.getElementById('name-skip').textContent    = t.skip;
}

function confirmName(skip = false) {
  const input = document.getElementById('name-input');
  if (!skip && input.value.trim()) {
    playerName = input.value.trim();
    localStorage.setItem('sf_player_name', playerName);
  }
  const overlay = document.getElementById('name-overlay');
  overlay.classList.add('hide');
  setTimeout(() => overlay.style.display = 'none', 350);

  const startScene = Object.values(story.scenes).find(s => s.isStart);
  if (startScene) goToScene(startScene.id);
}

// ══════════════════════════════════════════════
// STATS BAR
// ══════════════════════════════════════════════
function renderStatsBar() {
  const bar = document.getElementById('stats-bar');
  const scroll = document.getElementById('scroll-area');
  if (!story.stats || !story.stats.length) {
    bar.classList.add('hidden');
    scroll.classList.remove('has-stats');
    return;
  }
  bar.classList.remove('hidden');
  scroll.classList.add('has-stats');
  updateStatsBar();
}

function updateStatsBar() {
  const bar = document.getElementById('stats-bar');
  if (!story.stats) return;
  bar.innerHTML = story.stats.map(s => {
    const val = stats[s.id] ?? s.start ?? 0;
    const max = s.max || 100;
    const pct = Math.round(Math.max(0, Math.min(val / max * 100, 100)));
    const color = s.color || 'var(--accent)';
    const display = s.id === 'credits' ? val + '¥' : val;
    return `<div class="stat-chip" style="--color:${color};--pct:${pct}%">
      <span class="stat-label">${s.label}</span>
      <span class="stat-value">${display}</span>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// SCENE ENGINE
// ══════════════════════════════════════════════
function goToScene(id, choiceText, externalStory) {
  // ── Navigation vers une histoire externe ──────────────────
  if (externalStory) {
    loadExternalStory(externalStory, id);
    return;
  }

  // Annuler toute animation de frappe en cours
  if (typewriterTimeout) { clearTimeout(typewriterTimeout); typewriterTimeout = null; }

  const scene = story.scenes[id];
  if (!scene) { showError('Scène introuvable : ' + id); return; }

  // Log history
  if (currentId) history.push({ id: currentId, choice: choiceText || '' });
  currentId = id;

  // Track scene read
  trackStats('scene_read');

  // Update progress bar (rough estimate based on visited vs total)
  const total = Object.keys(story.scenes).length;
  const pct = Math.min(95, Math.round(history.length / total * 100));
  document.getElementById('progress-fill').style.width = pct + '%';

  // Update drawer scene count
  document.getElementById('drawer-scene-count').textContent =
    history.length + ' scène' + (history.length > 1 ? 's' : '') + ' visitée' + (history.length > 1 ? 's' : '');

  if (scene.isEnd) {
    trackStats('story_finish');
    playTransition(scene.transition || 'fade', () => renderEndScene(scene));
  } else {
    playTransition(scene.transition || 'fade', () => renderScene(scene));
  }

  // Scroll to top
  document.getElementById('scroll-area').scrollTo({ top: 0, behavior: 'smooth' });
}

function hasUnlock(feature) {
  const unlocked = JSON.parse(localStorage.getItem('sf_unlocked_packs') || '["free","kids"]');
  return unlocked.includes(feature) || unlocked.includes('creator') || unlocked.includes('all');
}

async function loadExternalStory(storyFile, startScene) {
  // Vérifier si les portails sont débloqués
  if (!hasUnlock('portals')) {
    // Afficher un message premium
    const notif = document.createElement('div');
    notif.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
      background:#13110e;border:1px solid rgba(200,169,110,0.4);border-radius:10px;
      padding:12px 20px;font-family:'DM Mono',monospace;font-size:11px;
      color:var(--gold,#c8a96e);letter-spacing:1px;z-index:999;text-align:center;
      animation:fade-in .3s ease`;
    notif.innerHTML = '🔒 Portails inter-histoires<br><span style="opacity:0.6;font-size:10px">Fonctionnalité Premium — bientôt disponible</span>';
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
    return;
  }
  // Écran de transition
  const overlay = document.createElement('div');
  overlay.style.cssText = `position:fixed;inset:0;background:#0a0a0e;z-index:9999;
    display:flex;align-items:center;justify-content:center;
    font-family:'Cinzel',serif;color:var(--gold);font-size:13px;
    letter-spacing:3px;opacity:0;transition:opacity .4s`;
  overlay.textContent = '✦';
  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.style.opacity = '1');

  try {
    const r = await fetch(storyFile);
    if (!r.ok) throw new Error('Fichier introuvable : ' + storyFile);
    const newStory = await r.json();

    // Attendre la fin de la transition
    await new Promise(res => setTimeout(res, 600));

    // Réinitialiser complètement l'état
    story     = newStory;
    stats     = {};
    (story.stats || []).forEach(s => stats[s.id] = s.start || 0);
    history   = [];
    currentId = null;

    // Mettre à jour le titre
    document.getElementById('story-title').textContent = story.name || '';
    document.title = story.name || 'Fableris';

    // Réinitialiser les stats dans le drawer
    renderStatBadges();

    // Lancer depuis la scène demandée ou la scène de départ
    const targetId = startScene && story.scenes[startScene]
      ? startScene
      : Object.keys(story.scenes).find(sid => story.scenes[sid].isStart);

    if (!targetId) throw new Error('Aucune scène de départ');

    // Intro cinéma si l'histoire en a une
    overlay.style.opacity = '0';
    setTimeout(() => {
      overlay.remove();
      goToScene(targetId);
    }, 400);

  } catch(e) {
    overlay.remove();
    showError('Impossible de charger l\'histoire : ' + e.message);
  }
}

function renderScene(scene) {
  // Shuffle choices
  const shuffled = shuffleArray([...(scene.choices || [])]);

  // Stocker les choix dans une variable globale pour les onclick
  window._currentChoices = shuffled;

  // Lire le mode d'affichage des choix verrouillés
  const opts = JSON.parse(localStorage.getItem('sf_options') || '{}');
  const lockedMode = opts.locked || 'hidden'; // 'hidden' ou 'grayed'

  const choicesHTML = shuffled.map((c, i) => {
    const locked = isChoiceLocked(c);
    // Vérifier les conditions de stats
    const req = c.requires;
    let statLocked = false;
    let statReason = '';
    if (req && req.stat) {
      const currentVal = stats[req.stat] !== undefined ? stats[req.stat] : 0;
      const statDef = story.stats?.find(s => s.id === req.stat);
      const statLabel = statDef?.label || req.stat;
      if (req.min !== undefined && currentVal < req.min) {
        statLocked = true;
        statReason = `${statLabel} ${currentVal}/${req.min}`;
      }
      if (req.max !== undefined && currentVal > req.max) {
        statLocked = true;
        statReason = `${statLabel} ${currentVal} (max ${req.max})`;
      }
    }
    // Si masqué ET stat insuffisante → ne pas afficher du tout
    if (statLocked && lockedMode === 'hidden') return '';

    return `<button class="choice-btn${locked || statLocked ? ' locked' : ''}${c.story ? ' external-story' : ''}"
      style="${locked || statLocked ? 'opacity:0.35;cursor:not-allowed' : ''}"
      onclick="${locked || statLocked ? '' : c.story
        ? `pickChoice('${c.vers}', ${i}, this, '${c.story}')`
        : `pickChoice('${c.vers}', ${i}, this)`}"
      ${locked || statLocked ? 'disabled' : ''}>
      <span class="choice-index">— ${String(i+1).padStart(2,'0')}</span>
      ${c.story ? `<span style="float:right;font-size:10px;opacity:0.5">🔗</span>` : ''}
      ${escHtml(c.text)}
      ${statLocked ? `<span style="display:block;font-size:10px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace;letter-spacing:0.5px">
        🔒 min insuffisant (${statReason})</span>` : ''}
      ${locked ? `<span style="display:block;font-size:11px;color:var(--text3);margin-top:4px;font-family:'DM Mono',monospace">
        ${getLockedReason(c)}</span>` : ''}
    </button>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="scene-in">
      ${scene.location
        ? `<div class="location-pill">${escHtml(scene.location)}</div>`
        : ''}
      ${scene.image ? `
      <div class="scene-illustration">
        <img src="assets/images/${escHtml(scene.image)}"
          alt=""
          onerror="this.parentElement.style.display='none'">
      </div>` : ''}
      ${scene.narrator ? `<div class="narrator-text" id="narrator-text"></div>` : ''}
      <div class="scene-text" id="typewriter-text"></div>
      <div id="choice-timer">
        <div class="timer-label">TEMPS RESTANT <span id="timer-count"></span></div>
        <div class="timer-track"><div class="timer-fill" id="timer-fill"></div></div>
      </div>
      <div id="choices-area" class="hidden">${choicesHTML}</div>
    </div>`;

  const showChoices = () => {
    const ca = document.getElementById('choices-area');
    if (ca) { ca.classList.remove('hidden'); ca.classList.add('reveal'); }
    // Démarrer le timer si la scène en a un
    if (scene.timer && scene.timer.duration > 0) {
      startChoiceTimer(scene.timer.duration, scene.timer.auto || 'random');
    }
  };

  const showMainText = () => {
    typewrite(formatText(scene.text || ''), document.getElementById('typewriter-text'), showChoices);
  };

  // Mode immersif — cacher l'UI après 1.5s
  startImmersive();

  // Si narrateur : l'écrire d'abord (plus lent) puis enchaîner le texte principal
  if (scene.narrator) {
    typewrite(
      formatText(scene.narrator),
      document.getElementById('narrator-text'),
      () => setTimeout(showMainText, 400),
      true // mode narrateur = plus lent
    );
  } else {
    showMainText();
  }
}

let typewriterTimeout = null;

function getTypeSpeed(narratorMode = false) {
  const opts = JSON.parse(localStorage.getItem('sf_options') || '{}');
  const base = narratorMode ? 1.6 : 1; // narrateur plus lent
  switch(opts.textspeed) {
    case 'fast':   return Math.round(12 * base);
    case 'slow':   return Math.round(45 * base);
    default:       return Math.round(25 * base);
  }
}

function typewrite(html, container, onDone, narratorMode = false) {
  // Annuler toute animation en cours
  if (typewriterTimeout) { clearTimeout(typewriterTimeout); typewriterTimeout = null; }

  // Extraire le texte brut depuis le HTML formaté
  // On va insérer le HTML caractère par caractère en gérant les balises
  const speed = getTypeSpeed(narratorMode);
  let i = 0;
  let displayed = '';
  let skipped = false;

  // Skip au tap/clic
  const skipHandler = () => {
    skipped = true;
    container.innerHTML = html;
    if (onDone) onDone();
    document.getElementById('scroll-area')?.removeEventListener('click', skipHandler);
  };
  document.getElementById('scroll-area')?.addEventListener('click', skipHandler, { once: true });

  function tick() {
    if (skipped) return;
    if (i >= html.length) {
      // Fin — retirer le curseur
      container.innerHTML = html;
      document.getElementById('scroll-area')?.removeEventListener('click', skipHandler);
      if (onDone) onDone();
      return;
    }

    // Sauter les balises HTML entières d'un coup
    if (html[i] === '<') {
      const end = html.indexOf('>', i);
      if (end !== -1) {
        displayed += html.slice(i, end + 1);
        i = end + 1;
      } else {
        displayed += html[i++];
      }
      container.innerHTML = displayed + '<span class="cursor"></span>';
      typewriterTimeout = setTimeout(tick, 0);
      return;
    }

    // Sauter les entités HTML (&amp; &lt; etc.)
    if (html[i] === '&') {
      const end = html.indexOf(';', i);
      if (end !== -1 && end - i < 8) {
        displayed += html.slice(i, end + 1);
        i = end + 1;
        container.innerHTML = displayed + '<span class="cursor"></span>';
        typewriterTimeout = setTimeout(tick, 0);
        return;
      }
    }

    // Caractère normal
    displayed += html[i++];
    container.innerHTML = displayed + '<span class="cursor"></span>';

    // Auto-scroll pour suivre le texte
    const scrollArea = document.getElementById('scroll-area');
    if (scrollArea) scrollArea.scrollTop = scrollArea.scrollHeight;

    // Pause plus longue sur ponctuation
    const ch = displayed[displayed.length - 1];
    let delay = speed;
    if (['.', '!', '?'].includes(ch)) delay = speed * 8;
    else if ([',', ';', ':'].includes(ch)) delay = speed * 3;
    else if (ch === '\n') delay = speed * 4;

    typewriterTimeout = setTimeout(tick, delay);
  }

  tick();
}

function pickChoice(targetId, choiceIndex, btnEl, externalStory) {
  if (!targetId && !externalStory) return;
  stopChoiceTimer();

  // Récupérer l'objet choice depuis le tableau stocké
  const choice = window._currentChoices?.[choiceIndex] || {};

  // Effet au clic sur le bouton
  if (btnEl && choice?.clickEffect) {
    playClickEffect(btnEl, choice.clickEffect);
  }

  // Apply stat effects
  let notifParts = [];
  if (choice && choice.effects) {
    choice.effects.forEach(eff => {
      if (stats[eff.stat] !== undefined) {
        stats[eff.stat] = Math.max(0, stats[eff.stat] + (eff.val || 0));
        const sign = eff.val > 0 ? '+' : '';
        const statDef = story.stats.find(s => s.id === eff.stat);
        notifParts.push(`${statDef ? statDef.label : eff.stat} ${sign}${eff.val}`);
      }
    });
    updateStatsBar();
  }

  // Show notification if effects
  if (notifParts.length) {
    const notif = document.createElement('div');
    notif.className = 'stat-notif';
    notif.innerHTML = '⚡ ' + notifParts.join(' · ');
    document.getElementById('content').prepend(notif);
    setTimeout(() => notif.remove(), 2500);
  }

  // Délai léger pour laisser l'effet au clic se jouer
  trackStats("choice_made"); const delay = (choice?.clickEffect && choice.clickEffect !== 'none') ? 320 : 0;
  setTimeout(() => goToScene(targetId, choice?.text || '', externalStory), delay);
}

function playTransition(type, callback) {
  const overlay = document.getElementById('fx-overlay');
  overlay.className = '';

  switch(type) {
    case 'flash':
      overlay.classList.add('flash');
      setTimeout(callback, 250);
      break;
    case 'glitch':
      overlay.classList.add('glitch-flicker');
      setTimeout(callback, 200);
      break;
    case 'scanline':
      overlay.classList.add('scanlines');
      setTimeout(callback, 300);
      break;
    case 'fade':
      // Fondu via le content
      const content = document.getElementById('content');
      content.style.transition = 'opacity .25s ease';
      content.style.opacity = '0';
      setTimeout(() => {
        callback();
        content.style.opacity = '1';
      }, 260);
      return;
    default:
      callback();
      return;
  }
  setTimeout(() => overlay.className = '', 600);
}

function playClickEffect(btn, type) {
  if (!btn || !type || type === 'none') return;
  const classMap = {
    pulse:   'btn-fx-pulse',
    shake:   'btn-fx-shake',
    flash:   'btn-fx-flash',
    glitch:  'btn-fx-glitch',
    vibrate: 'btn-fx-pulse' // vibration → pulse visuel sur mobile
  };
  const cls = classMap[type];
  if (!cls) return;
  btn.classList.add(cls);
  setTimeout(() => btn.classList.remove(cls), 400);
}


function isChoiceLocked(choice) {
  if (!choice.requires) return false;
  const req = choice.requires;

  // Nouveau format supporté :
  // { "stat": "lucidite", "min": 65 }
  // { "stat": "lucidite", "max": 64 }
  // { "stat": "lucidite", "min": 20, "max": 80 }
  if (req.stat) {
    const currentVal = stats[req.stat] ?? 0;
    if (req.min !== undefined && currentVal < req.min) return true;
    if (req.max !== undefined && currentVal > req.max) return true;
    return false;
  }

  // Ancien format supporté :
  // { "lucidite": 65, "memoire": 30 }
  return Object.entries(req).some(([k, v]) => (stats[k] ?? 0) < v);
}

function getLockedReason(choice) {
  if (!choice.requires) return '';
  const req = choice.requires;

  if (req.stat) {
    const currentVal = stats[req.stat] ?? 0;
    const statDef = story.stats?.find(s => s.id === req.stat);
    const statLabel = statDef?.label || req.stat;

    if (req.min !== undefined && currentVal < req.min) {
      return `${statLabel} insuffisant (${currentVal}/${req.min})`;
    }
    if (req.max !== undefined && currentVal > req.max) {
      return `${statLabel} trop élevé (${currentVal}/${req.max})`;
    }
    return '';
  }

  const parts = Object.entries(req)
    .filter(([k, v]) => (stats[k] ?? 0) < v)
    .map(([k, v]) => {
      const s = story.stats?.find(s => s.id === k);
      return `${s ? s.label : k} insuffisant (${stats[k] ?? 0}/${v})`;
    });
  return parts.join(', ');
}

function startChoiceTimer(duration, autoMode) {
  stopChoiceTimer();
  const timerEl = document.getElementById('choice-timer');
  const fillEl  = document.getElementById('timer-fill');
  const countEl = document.getElementById('timer-count');
  if (!timerEl) return;

  timerEl.classList.add('active');
  fillEl.style.width = '100%';
  fillEl.classList.remove('urgent');
  countEl.textContent = duration + 's';

  const endTime = Date.now() + duration * 1000;

  _choiceTimerInterval = setInterval(() => {
    const remaining = Math.max(0, endTime - Date.now());
    const pct = (remaining / (duration * 1000)) * 100;
    fillEl.style.width = pct + '%';
    countEl.textContent = Math.ceil(remaining / 1000) + 's';
    if (pct < 30) fillEl.classList.add('urgent');
    if (remaining <= 0) { stopChoiceTimer(); autoPickChoice(autoMode); }
  }, 100);
}

function stopChoiceTimer() {
  if (_choiceTimerInterval) { clearInterval(_choiceTimerInterval); _choiceTimerInterval = null; }
  const t = document.getElementById('choice-timer');
  if (t) t.classList.remove('active');
  const f = document.getElementById('timer-fill');
  if (f) f.classList.remove('urgent');
}

function autoPickChoice(autoMode) {
  const choices = window._currentChoices || [];
  const opts = JSON.parse(localStorage.getItem('sf_options') || '{}');
  const lockedMode = opts.locked || 'hidden';
  const accessible = choices.filter(c => {
    const req = c.requires;
    if (!req?.stat) return true;
    const val = stats[req.stat] || 0;
    if (req.min !== undefined && val < req.min) return lockedMode !== 'hidden';
    return true;
  });
  if (!accessible.length) return;
  let chosen;
  if (autoMode === 'first')      chosen = accessible[0];
  else if (autoMode === 'last')  chosen = accessible[accessible.length - 1];
  else                           chosen = accessible[Math.floor(Math.random() * accessible.length)];
  const idx = choices.indexOf(chosen);
  const btns = document.querySelectorAll('.choice-btn');
  if (btns[idx]) {
    btns[idx].style.borderColor = 'var(--accent2)';
    btns[idx].style.background  = 'rgba(255,128,64,0.15)';
    setTimeout(() => pickChoice(chosen.vers, idx, btns[idx]), 500);
  } else {
    pickChoice(chosen.vers, idx, null);
  }
}

function hideUI() {
  uiVisible = false;
  document.getElementById('topbar')?.classList.add('ui-hidden');
  document.getElementById('stats-bar')?.classList.add('ui-hidden');
  document.getElementById('fab-wrap')?.classList.add('ui-hidden');
  document.getElementById('progress-bar')?.classList.add('ui-hidden');
  document.getElementById('immersive-dot')?.classList.remove('ui-visible');
  document.getElementById('scroll-area')?.classList.add('ui-hidden');
}

function showUI() {
  uiVisible = true;
  document.getElementById('topbar')?.classList.remove('ui-hidden');
  document.getElementById('stats-bar')?.classList.remove('ui-hidden');
  document.getElementById('fab-wrap')?.classList.remove('ui-hidden');
  document.getElementById('progress-bar')?.classList.remove('ui-hidden');
  document.getElementById('immersive-dot')?.classList.add('ui-visible');
  document.getElementById('scroll-area')?.classList.remove('ui-hidden');
  // Auto-hide after 4s
  clearTimeout(uiHideTimer);
  uiHideTimer = setTimeout(hideUI, 4000);
}

// Masquer l'UI dès qu'on démarre une scène
function startImmersive() {
  clearTimeout(uiHideTimer);
  uiHideTimer = setTimeout(hideUI, 1500);
}


function trackStats(event, data = {}) {
  try {
    const s = JSON.parse(localStorage.getItem('sf_player_stats') || '{}');
    if (!s.since) s.since = Date.now();
    if (!s.storiesStarted) s.storiesStarted = 0;
    if (!s.storiesFinished) s.storiesFinished = 0;
    if (!s.scenesRead) s.scenesRead = 0;
    if (!s.choicesMade) s.choicesMade = 0;
    if (!s.endingsFound) s.endingsFound = 0;
    if (!s.minutesSpent) s.minutesSpent = 0;
    if (!s.langsPlayed) s.langsPlayed = [];
    if (!s.unlockedBadges) s.unlockedBadges = [];
    if (!s.activity) s.activity = {};

    const today = new Date().toISOString().slice(0,10);
    const hour = new Date().getHours();

    switch(event) {
      case 'story_start':
        s.storiesStarted++;
        const lng = localStorage.getItem('sf_lang') || 'fr';
        if (!s.langsPlayed.includes(lng)) s.langsPlayed.push(lng);
        s._storyStartTime = Date.now();
        break;
      case 'scene_read':
        s.scenesRead++;
        s.activity[today] = (s.activity[today] || 0) + 1;
        if (hour >= 0 && hour < 5) s.playedAtNight = true;
        break;
      case 'choice_made':
        s.choicesMade++;
        break;
      case 'story_finish':
        s.storiesFinished++;
        s.endingsFound++;
        if (s._storyStartTime) {
          const mins = Math.round((Date.now() - s._storyStartTime) / 60000);
          s.minutesSpent += mins;
          if (mins < 5) s.hadFastRun = true;
        }
        break;
    }
    localStorage.setItem('sf_player_stats', JSON.stringify(s));
  } catch(e) {}
}

let fabOpen = false;

function toggleFab() {
  fabOpen = !fabOpen;
  document.getElementById('fab-main').classList.toggle('open', fabOpen);
  document.getElementById('fab-save').classList.toggle('show', fabOpen);
  document.getElementById('fab-bookmark').classList.toggle('show', fabOpen);
}

function closeFab() {
  fabOpen = false;
  document.getElementById('fab-main').classList.remove('open');
  document.getElementById('fab-save').classList.remove('show');
  document.getElementById('fab-bookmark').classList.remove('show');
}

// Fermer le FAB en tapant ailleurs
document.addEventListener('click', e => {
  if (fabOpen && !e.target.closest('#fab-wrap')) closeFab();
});

function getSaveKey() {
  try {
    const params = new URLSearchParams(window.location.search);
    const file = params.get('story') || localStorage.getItem('sf_game_file') || 'unknown';
    return 'sf_save_' + file.replace(/[^a-z0-9]/gi, '_');
  } catch(e) { return 'sf_save_unknown'; }
}

function buildSaveData(isBookmark = false) {
  const scene = story?.scenes[currentId];
  return {
    sceneId:     currentId,
    sceneTitle:  scene?.title || '',
    storyName:   story?.name || '',
    storyFile:   new URLSearchParams(window.location.search).get('story') || localStorage.getItem('sf_game_file'),
    stats:       { ...stats },
    history:     [...history],
    playerName,
    isBookmark,
    savedAt:     Date.now()
  };
}

function saveProgress() {
  if (!currentId || !story) return;
  const data = buildSaveData(false);
  localStorage.setItem(getSaveKey(), JSON.stringify(data));
  closeFab();
  showBmToast(gt('progressSaved'));
}

function saveBookmark() {
  if (!currentId || !story) return;
  const data = buildSaveData(true);
  // Sauvegarder aussi dans la liste globale des marque-pages
  const key = getSaveKey();
  localStorage.setItem(key, JSON.stringify(data));
  // Liste des marque-pages pour stories.html
  const bmList = JSON.parse(localStorage.getItem('sf_bookmarks') || '[]');
  const existing = bmList.findIndex(b => b.storyFile === data.storyFile);
  if (existing >= 0) bmList[existing] = data;
  else bmList.unshift(data);
  localStorage.setItem('sf_bookmarks', JSON.stringify(bmList.slice(0, 10))); // max 10
  closeFab();
  showBmToast(gt('bmSaved'));
}

function loadSavedProgress() {
  try {
    const data = JSON.parse(localStorage.getItem(getSaveKey()) || 'null');
    if (!data || !data.sceneId) return false;
    if (!story.scenes[data.sceneId]) return false;
    // Restaurer l'état
    stats      = data.stats || {};
    history    = data.history || [];
    playerName = data.playerName || playerName;
    updateStatsBar();
    goToScene(data.sceneId);
    return true;
  } catch(e) { return false; }
}

let bmToastTimer;
function showBmToast(msg) {
  const el = document.getElementById('bm-toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(bmToastTimer);
  bmToastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}


// ══════════════════════════════════════════════
// IMPORT JSON DIRECT
// ══════════════════════════════════════════════
function handleGameImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.scenes) throw new Error('Format invalide');
      story = data;
      stats = {}; history = []; currentId = null;
      if (story.theme) applyTheme(story.theme);
      (story.stats || []).forEach(s => { stats[s.id] = s.start || 0; });
      const title = story.name || file.name;
      document.getElementById('game-title').textContent = title;
      document.getElementById('drawer-game-title').textContent = title;
      document.title = title;
      renderStatsBar();
      applyGameUI();
      document.getElementById('progress-fill').style.width = '0%';
      const startScene = Object.values(story.scenes).find(s => s.isStart);
      if (!startScene) { showBmToast('⚠ Aucune scène de départ'); return; }
      goToScene(startScene.id);
      showBmToast('✓ ' + title + ' chargé');
    } catch(err) {
      showBmToast('⚠ Fichier JSON invalide');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

  showUI(); clearTimeout(uiHideTimer); // garder visible pendant le menu
  document.getElementById('menu-overlay').classList.add('open');
}

  document.getElementById('menu-overlay').classList.remove('open');

// ══════════════════════════════════════════════
// RESTART
// ══════════════════════════════════════════════
function restartGame() {
  stats = {};
  (story.stats || []).forEach(s => { stats[s.id] = s.start || 0; });
  history = [];
  currentId = null;
  document.getElementById('progress-fill').style.width = '0%';
  updateStatsBar();

  // Rejouer l'intro cinéma
  const loading = document.getElementById('loading');
  if (loading) {
    loading.style.display = 'flex';
    loading.style.opacity = '1';
    loading.classList.remove('fade');
    // Reset animations
    const els = loading.querySelectorAll('.intro-studio,.intro-title,.intro-pegasus,.intro-divider');
    els.forEach(el => {
      el.style.animation = 'none';
      el.style.opacity = '0';
      if (el.classList.contains('intro-divider')) el.style.width = '0';
      el.offsetHeight;
      el.style.animation = '';
    });
    setTimeout(() => {
      hideLoading();
      const startScene = Object.values(story.scenes).find(s => s.isStart);
      if (startScene) { trackStats('story_start'); goToScene(startScene.id); }
    }, 4500);
  } else {
    const startScene = Object.values(story.scenes).find(s => s.isStart);
    if (startScene) goToScene(startScene.id);
  }
}

// ══════════════════════════════════════════════
// UTILS

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function formatText(text) {
  if (!text) return '';
  // Remplacer {{player}} par le nom du joueur
  const name = playerName || '?';
  return escHtml(text)
    .replace(/\{\{player\}\}/g, `<em>${escHtml(name)}</em>`)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,     '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function hideLoading() {
  const el = document.getElementById('loading');
  if (!el) return;
  el.classList.add('fade');
  setTimeout(() => { el.style.display = 'none'; }, 900);
}

function showError(msg) {
  // Cacher le loading dans tous les cas
  const loading = document.getElementById('loading');
  if (loading) loading.style.display = 'none';
  document.getElementById('error-msg').innerHTML = msg;
  document.getElementById('error-screen').classList.add('show');
}

// ══════════════════════════════════════════════
// BACKGROUND — canvas stars + particles
// ══════════════════════════════════════════════
function hexToRgb(hex) {
  // handles #rrggbb
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return isNaN(r) ? null : {r,g,b};
}

function getAccentRgb() {
  const accent = getComputedStyle(document.documentElement)
    .getPropertyValue('--accent').trim();
  return hexToRgb(accent) || {r:124, g:109, b:250};
}

function initCanvas() {
  const canvas = document.getElementById('bg-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const stars = Array.from({length:60}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.2,
    a: Math.random() * 0.25 + 0.04,
    speed: Math.random() * 0.3 + 0.08,
    phase: Math.random() * Math.PI * 2
  }));

  let frame = 0;
  let rgb = getAccentRgb();

  function draw() {
    // Refresh color every 120 frames in case theme changes
    if (frame % 120 === 0) rgb = getAccentRgb();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const twinkle = s.a * (0.6 + 0.4 * Math.sin(frame * s.speed * 0.05 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${twinkle})`;
      ctx.fill();
    });
    frame++;
    requestAnimationFrame(draw);
  }
  draw();

  window.addEventListener('resize', () => {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars.forEach(s => {
      s.x = Math.random() * canvas.width;
      s.y = Math.random() * canvas.height;
    });
  });
}

function createParticles() {
  // Remove old particles if restarting
  document.querySelectorAll('.particle').forEach(p => p.remove());
  const count = window.innerWidth < 480 ? 10 : 16;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size    = Math.random() * 2 + 1;
    const delay   = Math.random() * 14;
    const duration = 12 + Math.random() * 16;
    const left    = Math.random() * 100;
    const drift   = (Math.random() - 0.5) * 80;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${left}vw; bottom:-10px;
      --drift:${drift}px;
      animation-duration:${duration}s;
      animation-delay:${delay}s;
      z-index:2;
    `;
    document.body.appendChild(p);
  }
}

const _loadingTimeout = setTimeout(() => {
  const loading = document.getElementById('loading');
  if (loading && loading.style.display !== 'none') {
    showError('Chargement trop long. Vérifiez votre connexion ou revenez en arrière.');
  }
}, 12000);

// Annuler le timeout quand le jeu démarre
const _origHideLoading = hideLoading;
hideLoading = function() { clearTimeout(_loadingTimeout); _origHideLoading(); };

loadStory();
